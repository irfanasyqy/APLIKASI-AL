<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Print Bank Panin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier New', monospace;
            font-size: 10pt;
            width: 105mm;
            margin: 0 auto;
            padding: 5mm;
        }
        
        .print-container {
            position: relative;
            width: 100%;
            min-height: 140mm;
        }
        
        /* ========== KIRI ========== */
        .jumlah-angka {
            position: absolute;
            top: 5mm;
            left: 5mm;
            font-size: 13pt;
            font-weight: bold;
        }
        
        .terbilang {
            position: absolute;
            top: 12mm;
            left: 5mm;
            font-size: 9pt;
        }
        
        .nama-penerima {
            position: absolute;
            top: 22mm;
            left: 5mm;
            font-weight: bold;
        }
        
        .account {
            position: absolute;
            top: 29mm;
            left: 5mm;
        }
        
        .alamat {
            position: absolute;
            top: 36mm;
            left: 5mm;
        }
        
        .bank-name {
            position: absolute;
            top: 47mm;
            left: 5mm;
            font-weight: bold;
        }
        
        .bank-alamat {
            position: absolute;
            top: 54mm;
            left: 5mm;
        }
        
        .swift {
            position: absolute;
            top: 61mm;
            left: 5mm;
        }
        
        .negara {
            position: absolute;
            top: 68mm;
            left: 5mm;
        }
        
        .berita {
            position: absolute;
            top: 79mm;
            left: 5mm;
        }
        
        .tujuan {
            position: absolute;
            top: 86mm;
            left: 5mm;
        }
        
        .pengirim {
            position: absolute;
            top: 97mm;
            left: 5mm;
            font-weight: bold;
        }
        
        .deretan-angka {
            position: absolute;
            top: 104mm;
            left: 5mm;
            letter-spacing: 5px;
        }
        
        /* ========== KANAN ========== */
        .ref-no-cek {
            position: absolute;
            top: 22mm;
            right: 5mm;
            text-align: right;
        }
        
        .ref-norek-pengirim {
            position: absolute;
            top: 29mm;
            right: 5mm;
            text-align: right;
        }
        
        .ref-jumlah {
            position: absolute;
            top: 36mm;
            right: 5mm;
            text-align: right;
        }
        
        .jumlah-akhir {
            position: absolute;
            top: 50mm;
            right: 5mm;
            text-align: right;
            font-size: 13pt;
            font-weight: bold;
        }
        
        /* Detail Valas (khusus pembelian valas) */
        .detail-valas {
            position: absolute;
            top: 62mm;
            right: 5mm;
            text-align: right;
        }
        
        .biaya-item {
            position: absolute;
            top: 85mm;
            right: 5mm;
            text-align: right;
        }
        
        @media print {
            body {
                margin: 0;
                padding: 0;
            }
            @page {
                size: A4;
                margin: 0;
            }
        }
    </style>
</head>
<body>
    <div id="printContainer"></div>
    <script>
        const params = new URLSearchParams(window.location.search);
        
        const data = {
            currency: params.get('currency') || 'EUR',
            jumlah: parseFloat(params.get('jumlah')) || 0,
            terbilang: params.get('terbilang') || 'terbi',
            nama: params.get('nama') || 'nama',
            account: params.get('account') || 'norek',
            alamat: params.get('alamat') || 'alamt',
            bankName: params.get('bankName') || 'bank',
            bankAlamat: params.get('bankAlamat') || 'alamat bank',
            swift: params.get('swift') || 'swift',
            country: params.get('country') || 'negara',
            berita: params.get('berita') || 'berita',
            tujuan: params.get('tujuan') || 'tujuan',
            noLoa: params.get('noLoa') || 'noLoa',
            norekPengirim: params.get('norekPengirim') || 'norekPengirim',
            pengirim: params.get('pengirim') || 'pengirim',
            biayaTelex: parseFloat(params.get('biayaTelex')) || 0,
            metodeTransfer: params.get('metodeTransfer') || 'SHARE',
            biayaFullAmount: parseFloat(params.get('biayaFullAmount')) || 0,
            jenis: params.get('jenis') || 'transfer',
            kurs: parseFloat(params.get('kurs')) || 0,
            jumlahIDR: parseFloat(params.get('jumlahIDR')) || 0
        };
        
        const formattedJumlah = data.jumlah.toLocaleString('en-US', {minimumFractionDigits: 2});
        const norekFormat = data.norekPengirim.split('').join(' ');
        
        // FULL AMOUNT & BIAYA TELEX
        let barisFullAmount = '';
        if (data.metodeTransfer === 'FULL_AMOUNT') {
            barisFullAmount = `<div>${data.currency} ${data.biayaFullAmount.toLocaleString('en-US', {minimumFractionDigits: 2})}</div>`;
        } else {
            barisFullAmount = `<div>&nbsp;</div>`;
        }
        
        let biayaTelexText = '';
        if (data.biayaTelex === 50000) {
            biayaTelexText = 'Rp 50.000';
        } else {
            biayaTelexText = 'Rp 35.000';
        }
        
        const biayaItems = `
            <div>${data.currency} ${formattedJumlah}</div>
            ${barisFullAmount}
            <div>${biayaTelexText}</div>
        `;
        
        // DETAIL VALAS (dengan IDR)
        let detailValasHtml = '';
        if (data.jenis === 'valas') {
            const formattedJumlahValas = data.jumlah.toLocaleString('en-US', {minimumFractionDigits: 2});
            const formattedKurs = data.kurs.toLocaleString('id-ID');
            const formattedJumlahIDR = data.jumlahIDR.toLocaleString('id-ID');
            
            detailValasHtml = `
                <div>${data.currency} ${formattedJumlahValas}</div>
                <div>IDR ${formattedKurs}</div>
                <div><strong>IDR ${formattedJumlahIDR}</strong></div>
            `;
        }
        
        const html = `
            <div class="print-container">
                <!-- KIRI -->
                <div class="jumlah-angka">${data.currency} ${formattedJumlah}</div>
                <div class="terbilang">${data.terbilang}</div>
                
                <div class="nama-penerima">${data.nama}</div>
                <div class="account">${data.account}</div>
                <div class="alamat">${data.alamat}</div>
                
                <div class="bank-name">${data.bankName}</div>
                <div class="bank-alamat">${data.bankAlamat}</div>
                <div class="swift">${data.swift}</div>
                <div class="negara">${data.country}</div>
                
                <div class="berita">${data.berita}</div>
                <div class="tujuan">${data.tujuan}</div>
                
                <div class="pengirim">${data.pengirim}</div>
                <div class="deretan-angka">${norekFormat}</div>
                
                <!-- KANAN -->
                <div class="ref-no-cek">${data.noLoa}</div>
                <div class="ref-norek-pengirim">${data.norekPengirim}</div>
                <div class="ref-jumlah">${data.currency} ${formattedJumlah}</div>
                
                <div class="jumlah-akhir">${data.currency} ${formattedJumlah}</div>
                
                ${data.jenis === 'valas' ? `<div class="detail-valas">${detailValasHtml}</div>` : ''}
                
                <div class="biaya-item">${biayaItems}</div>
            </div>
        `;
        
        document.getElementById('printContainer').innerHTML = html;
        
    </script>

    <script>
    // Auto print setelah halaman selesai dimuat
    window.onload = function() {
        setTimeout(function() {
            window.print();
            // Optional: tutup window otomatis setelah print atau cancel
            // window.onafterprint = function() { window.close(); };
        }, 500);
    };
</script>

</body>
</html>
