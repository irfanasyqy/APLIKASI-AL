<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Print Bank Panin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        /* TAMPILAN DI LAYAR (seperti PDF viewer) */
        body {
            font-family: 'Courier New', monospace;
            font-size: 10pt;
            width: 210mm;
            min-height: 297mm;
            margin: 20px auto;
            padding: 10mm;
            background: #e0e0e0;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
        }
        
        /* Kertas putih */
        .print-container {
            background: white;
            width: 100%;
            min-height: 277mm;
            position: relative;
            padding: 5mm;
            box-shadow: 0 0 5px rgba(0,0,0,0.1);
        }
        
        /* ========== KIRI ========== */
        .currency {
            position: absolute;
            top: 5mm;
            left: 20mm;
            font-size: 13pt;
            font-weight: bold;
        }

        .jumlah-angka {
            position: absolute;
            top: 5mm;
            left: 40mm;
            font-size: 13pt;
            font-weight: bold;
        }
        
        .terbilang {
            position: absolute;
            top: 12mm;
            left: 10mm;
            font-size: 9pt;
        }
        
        .nama-penerima {
            position: absolute;
            top: 22mm;
            left: 5mm;
            font-weight: bold;
        }
        
        .account {
            position: absolute;
            top: 29mm;
            left: 5mm;
        }
        
        .alamat {
            position: absolute;
            top: 36mm;
            left: 5mm;
        }
        
        .bank-name {
            position: absolute;
            top: 47mm;
            left: 5mm;
            font-weight: bold;
        }
        
        .bank-alamat {
            position: absolute;
            top: 54mm;
            left: 5mm;
        }
        
        .swift {
            position: absolute;
            top: 61mm;
            left: 5mm;
        }
        
        .negara {
            position: absolute;
            top: 68mm;
            left: 5mm;
        }
        
        .berita {
            position: absolute;
            top: 79mm;
            left: 5mm;
        }
        
        .tujuan {
            position: absolute;
            top: 86mm;
            left: 5mm;
        }
        
        .pengirim {
            position: absolute;
            top: 97mm;
            left: 5mm;
            font-weight: bold;
        }
        
        .deretan-angka {
            position: absolute;
            top: 104mm;
            left: 5mm;
            letter-spacing: 5px;
        }
        
        /* ========== KANAN ========== */
        .ref-no-cek {
            position: absolute;
            top: 50mm;
            right: 10mm;
            text-align: right;
        }
        
        .ref-norek-pengirim {
            position: absolute;
            top: 50mm;
            right: 5mm;
            text-align: right;
        }
        
        /* TABEL RINCIAN BIAYA DI KANAN */
        .rincian-biaya {
            position: absolute;
            top: 58mm;
            right: 5mm;
            text-align: right;
            font-size: 9pt;
            font-family: 'Courier New', monospace;
        }
        
        .rincian-biaya table {
            width: auto;
            min-width: 100px;
            text-align: right;
            border-collapse: collapse;
        }
        
        .rincian-biaya td {
            padding: 1px 4px;
            white-space: nowrap;
        }
        
        .rincian-biaya .currency-col {
            font-weight: normal;
            text-align: left;
        }
        
        .rincian-biaya .kurs-col {
            font-weight: normal;
            text-align: right;
        }
        
        .rincian-biaya .jumlah-col {
            font-weight: bold;
            text-align: right;
        }
        
        .rincian-biaya .total-row {
            border-top: 1px dashed #000;
            font-weight: bold;
            font-size: 10pt;
        }
        
        .rincian-biaya .total-row td {
            padding-top: 5px;
        }
        
        /* Baris biaya telex (tanpa currency & kurs) */
        .rincian-biaya .telex-row td:first-child,
        .rincian-biaya .telex-row td:nth-child(2) {
            visibility: hidden;
        }
        
        .jumlah-akhir {
            position: absolute;
            top: 100mm;
            right: 5mm;
            text-align: right;
            font-size: 13pt;
            font-weight: bold;
        }
        
        .keterangan-biaya {
            position: absolute;
            top: 118mm;
            right: 5mm;
            text-align: right;
            font-size: 7pt;
            color: #666;
        }
        
        /* ========== SAAT CETAK ========== */
        @media print {
            body {
                background: white;
                margin: 0;
                padding: 0;
                box-shadow: none;
                width: 100%;
                min-height: auto;
            }
            .print-container {
                box-shadow: none;
                padding: 0;
                min-height: auto;
            }
            @page {
                size: A4;
                margin: 0;
            }
        }
    </style>
</head>
<body>
    <div id="printContainer"></div>
    <script>
        const params = new URLSearchParams(window.location.search);
        
        const data = {
            currency: params.get('currency') || 'USD',
            jumlah: parseFloat(params.get('jumlah')) || 0,
            terbilang: params.get('terbilang') || '-',
            nama: params.get('nama') || '-',
            account: params.get('account') || '-',
            alamat: params.get('alamat') || '-',
            bankName: params.get('bankName') || '-',
            bankAlamat: params.get('bankAlamat') || '-',
            swift: params.get('swift') || '-',
            country: params.get('country') || '-',
            berita: params.get('berita') || '-',
            tujuan: params.get('tujuan') || '-',
            noLoa: params.get('noLoa') || '-',
            norekPengirim: params.get('norekPengirim') || '',
            pengirim: params.get('pengirim') || '-',
            biayaTelex: parseFloat(params.get('biayaTelex')) || 0,
            metodeTransfer: params.get('metodeTransfer') || 'SHARE',
            biayaFullAmount: parseFloat(params.get('biayaFullAmount')) || 0,
            jenis: params.get('jenis') || 'transfer',
            kurs: parseFloat(params.get('kurs')) || 0,
            jumlahIDR: parseFloat(params.get('jumlahIDR')) || 0
        };
        
        // ========== FUNGSI CEK MATA UANG REKENING ASAL ==========
        function getCurrencyFromRekening(norek) {
            if (!norek) return 'IDR';
            const upper = norek.toUpperCase();
            if (upper.includes('USD')) return 'USD';
            if (upper.includes('EUR')) return 'EUR';
            if (upper.includes('IDR')) return 'IDR';
            return 'IDR';
        }
        
        const mataUangRekeningAsal = getCurrencyFromRekening(data.norekPengirim);
        
        // ========== APAKAH INI TRANSAKSI VALAS? (IDR ke USD/EUR) ==========
        const isTransaksiValas = (mataUangRekeningAsal === 'IDR' && data.currency !== 'IDR') || data.jenis === 'valas';
        
        // ========== APAKAH INI PEMBELIAN VALAS? ==========
        const isPembelianValas = data.jenis === 'valas';
        
        // ========== HITUNG JUMLAH AKHIR ==========
        let jumlahAkhir = data.jumlah;
        let showBiayaFull = false;
        
        if (data.metodeTransfer === 'FULL_AMOUNT' || data.metodeTransfer === 'FULL AMOUNT') {
            jumlahAkhir = data.jumlah + data.biayaFullAmount;
            showBiayaFull = true;
        }
        
        // Format angka
        const formattedJumlah = data.jumlah.toLocaleString('en-US', {minimumFractionDigits: 2});
        const formattedJumlahAkhir = jumlahAkhir.toLocaleString('en-US', {minimumFractionDigits: 2});
        const formattedBiayaFull = data.biayaFullAmount.toLocaleString('en-US', {minimumFractionDigits: 2});
        const formattedBiayaTelex = data.biayaTelex.toLocaleString('id-ID', {minimumFractionDigits: 0});
        const formattedKurs = data.kurs.toLocaleString('id-ID', {minimumFractionDigits: 2});
        const formattedJumlahIDR = data.jumlahIDR.toLocaleString('id-ID', {minimumFractionDigits: 0});
        
        // Konversi biaya full amount ke IDR jika ada kurs
        let biayaFullAmountIDR = 0;
        if (data.kurs > 0 && showBiayaFull) {
            biayaFullAmountIDR = data.biayaFullAmount * data.kurs;
        }
        const formattedBiayaFullIDR = biayaFullAmountIDR.toLocaleString('id-ID', {minimumFractionDigits: 0});
        
        // Jumlah akhir dalam IDR (jika transaksi valas)
        let jumlahAkhirIDR = 0;
        if (isTransaksiValas && data.kurs > 0) {
            jumlahAkhirIDR = jumlahAkhir * data.kurs;
        }
        const formattedJumlahAkhirIDR = jumlahAkhirIDR.toLocaleString('id-ID', {minimumFractionDigits: 0});
        
        const norekFormat = data.norekPengirim.split('').join(' ');
        
        // Fungsi format ribuan dengan RB (Ribuan)
        function formatRB(angka) {
            if (!angka) return '0';
            let str = angka.toString();
            let len = str.length;
            if (len >= 9) return str.substring(0, len-8) + ',' + str.substring(len-8, len-6) + 'M';
            if (len >= 6) return str.substring(0, len-5) + 'RB';
            if (len >= 4) return str.substring(0, len-3) + 'RB';
            return str;
        }
        
        const jumlahIDR_RB = formatRB(formattedJumlahIDR.replace(/,/g, ''));
        const biayaFullIDR_RB = formatRB(formattedBiayaFullIDR.replace(/,/g, ''));
        const biayaTelex_RB = formatRB(formattedBiayaTelex.replace(/,/g, ''));
        const jumlahAkhirIDR_RB = formatRB(formattedJumlahAkhirIDR.replace(/,/g, ''));
        
        // ========== BUILD RINCIAN BIAYA DI KANAN ==========
        let rincianHtml = '';
        let jumlahAkhirDisplay = '';
        let keteranganBiaya = '';
        
        if (isPembelianValas) {
            // ===== PEMBELIAN VALAS =====
            rincianHtml = `
                <table>
                    <tr>
                        <td class="currency-col">${data.currency} ${formattedJumlah}</td>
                        <td class="kurs-col">${formattedKurs}</td>
                        <td class="jumlah-col">IDR ${jumlahIDR_RB}</td>
                    </tr>
                </table>
            `;
            jumlahAkhirDisplay = `${data.currency} ${formattedJumlah}<br>(IDR ${formattedJumlahIDR})`;
            keteranganBiaya = `Pembelian valas | 1 ${data.currency} = IDR ${formattedKurs}`;
            
        } else if (isTransaksiValas) {
            // ===== TRANSFER VALAS (IDR ke USD/EUR) =====
            let rows = '';
            
            // Baris 1: Jumlah
            rows += `
                <tr>
                    <td class="currency-col">${data.currency} ${formattedJumlah}</td>
                    <td class="kurs-col">${formattedKurs}</td>
                    <td class="jumlah-col">IDR ${jumlahIDR_RB}</td>
                </tr>
            `;
            
            // Baris 2: Full Amount (jika ada)
            if (showBiayaFull) {
                rows += `
                    <tr>
                        <td class="currency-col">${data.currency} ${formattedBiayaFull}</td>
                        <td class="kurs-col">${formattedKurs}</td>
                        <td class="jumlah-col">IDR ${biayaFullIDR_RB}</td>
                    </tr>
                `;
            }
            
            // Baris 3: Biaya Telex (jika ada)
            if (data.biayaTelex > 0) {
                rows += `
                    <tr class="telex-row">
                        <td class="currency-col"></td>
                        <td class="kurs-col"></td>
                        <td class="jumlah-col">IDR ${biayaTelex_RB}</td>
                    </tr>
                `;
            }
            
            // Baris Total
            rows += `
                <tr class="total-row">
                    <td class="currency-col"></td>
                    <td class="kurs-col"></td>
                    <td class="jumlah-col">IDR ${jumlahAkhirIDR_RB}</td>
                </tr>
            `;
            
            rincianHtml = `<tr>${rows}</table>`;
            jumlahAkhirDisplay = `${data.currency} ${formattedJumlahAkhir}<br>(IDR ${formattedJumlahAkhirIDR})`;
            keteranganBiaya = `Transfer valas IDR → ${data.currency} | 1 ${data.currency} = IDR ${formattedKurs}`;
            if (showBiayaFull) keteranganBiaya += ` | Full amount include`;
            if (data.biayaTelex > 0) keteranganBiaya += ` | Biaya telex IDR ${formattedBiayaTelex}`;
            
        } else {
            // ===== TRANSFER BIASA (USD ke USD atau EUR ke EUR) =====
            let rows = '';
            
            // Baris 1: Jumlah
            rows += `
                <tr>
                    <td class="currency-col"></td>
                    <td class="kurs-col"></td>
                    <td class="jumlah-col">${data.currency} ${formattedJumlah}</td>
                </tr>
            `;
            
            // Baris 2: Full Amount (jika ada)
            if (showBiayaFull) {
                rows += `
                    <tr>
                        <td class="currency-col"></td>
                        <td class="kurs-col"></td>
                        <td class="jumlah-col">${data.currency} ${formattedBiayaFull}</td>
                    </tr>
                `;
            }
            
            // Baris 3: Biaya Telex (jika ada dan rek asal IDR)
            if (data.biayaTelex > 0 && mataUangRekeningAsal === 'IDR') {
                rows += `
                    <tr class="telex-row">
                        <td class="currency-col"></td>
                        <td class="kurs-col"></td>
                        <td class="jumlah-col">IDR ${biayaTelex_RB}</td>
                    </tr>
                `;
            }
            
            // Baris Total (jika ada full amount)
            if (showBiayaFull) {
                rows += `
                    <tr class="total-row">
                        <td class="currency-col"></td>
                        <td class="kurs-col"></td>
                        <td class="jumlah-col">${data.currency} ${formattedJumlahAkhir}</td>
                    </tr>
                `;
            }
            
            rincianHtml = `<tr>${rows}</table>`;
            jumlahAkhirDisplay = showBiayaFull ? `${data.currency} ${formattedJumlahAkhir}` : `${data.currency} ${formattedJumlah}`;
            keteranganBiaya = `Transfer ${mataUangRekeningAsal} → ${data.currency}`;
            if (showBiayaFull) keteranganBiaya += ` | Full amount include`;
            if (data.biayaTelex > 0 && mataUangRekeningAsal === 'IDR') keteranganBiaya += ` | Biaya telex IDR ${formattedBiayaTelex} (terpisah)`;
        }
        
        // ========== RENDER HTML ==========
        const html = `
            <div class="print-container">
                <!-- KIRI -->
                <div class="currency">${data.currency}</div>
                <div class="jumlah-angka">${formattedJumlah}</div>
                <div class="terbilang">${data.terbilang}</div>
                
                <div class="nama-penerima">${data.nama}</div>
                <div class="account">${data.account}</div>
                <div class="alamat">${data.alamat}</div>
                
                <div class="bank-name">${data.bankName}</div>
                <div class="bank-alamat">${data.bankAlamat}</div>
                <div class="swift">${data.swift}</div>
                <div class="negara">${data.country}</div>
                
                <div class="berita">${data.berita}</div>
                <div class="tujuan">${data.tujuan}</div>
                
                <div class="pengirim">${data.pengirim}</div>
                <div class="deretan-angka">${norekFormat}</div>
                
                <!-- KANAN -->
                <div class="ref-no-cek">${data.noLoa}</div>
                <div class="ref-norek-pengirim">${data.norekPengirim}</div>
                
                <div class="rincian-biaya">
                    ${rincianHtml}
                </div>
                
                <div class="jumlah-akhir">
                    ${jumlahAkhirDisplay}
                </div>
                
                <div class="keterangan-biaya">
                    ${keteranganBiaya}
                </div>
            </div>
        `;
        
        document.getElementById('printContainer').innerHTML = html;
        
    </script>

    <!-- AUTO PRINT - KOMENTARI DULU UNTUK EDIT LAYOUT -->
    <script>
    /*
    window.onload = function() {
        setTimeout(function() {
            window.print();
        }, 500);
    };
    */
    </script>

</body>
</html>
