<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Print Bank Panin</title>
    <style>
        /* ======================================== */
        /* RESET & DASAR */
        /* ======================================== */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }

        /* ======================================== */
        /* UKURAN KERTAS TETAP A4 - TANPA SCALING */
        /* ======================================== */
        @page {
            size: A4 portrait;
            margin: 0;
            width: 210mm;
            height: 297mm;
        }

        body { 
            font-family: 'Courier New', monospace;
            font-size: 10pt; 
            width: 210mm; 
            min-height: 297mm; 
            margin: 0;
            padding: 0;
            background: white;
            overflow: hidden;
        }

        .print-container { 
            background: white; 
            width: 210mm;
            min-height: 297mm; 
            position: relative; 
            padding: 5mm;
            margin: 0;
            overflow: hidden;
            transform: none;
        }

        /* ======================================== */
        /* KOLOM KIRI - DATA PENGIRIM & PENERIMA */
        /* ======================================== */

        .currency { 
            position: absolute; 
            top: 38mm; 
            left: 18mm; 
            font-size: 11pt; 
            font-weight: bold; 
            white-space: nowrap; 
        }

        .jumlah-angka { 
            position: absolute; 
            top: 38mm; 
            left: 50mm; 
            font-size: 11pt; 
            font-weight: bold; 
            white-space: nowrap; 
        }

        .terbilang { 
            position: absolute; 
            top: 43mm; 
            left: 20mm; 
            font-size: 11pt;
            font-weight: bold; 
            max-width: 80mm; 
            white-space: normal; 
            word-wrap: break-word; 
            line-height: 1.2; 
            display: -webkit-box; 
            -webkit-line-clamp: 2; 
            -webkit-box-orient: vertical; 
            overflow: hidden; 
        }

        .nama-penerima { 
            position: absolute; 
            top: 56mm; 
            left: 18mm; 
            font-weight: bold; 
            white-space: nowrap; 
            max-width: 110mm; 
            overflow-x: auto; 
        }

        .account { 
            position: absolute; 
            top: 60mm; 
            left: 25mm;
            font-weight: bold; 
            white-space: nowrap; 
            max-width: 90mm; 
            overflow-x: auto; 
        }

        .alamat { 
            position: absolute; 
            top: 66mm; 
            left: 25mm; 
            font-weight: bold; 
            max-width: 90mm; 
            white-space: normal; 
            word-wrap: break-word; 
            line-height: 1.2; 
            display: -webkit-box; 
            -webkit-line-clamp: 2; 
            -webkit-box-orient: vertical; 
            overflow: hidden; 
        }

        .bank-name { 
            position: absolute; 
            top: 76mm; 
            left: 30mm; 
            font-weight: bold; 
            white-space: nowrap; 
            max-width: 90mm; 
            overflow-x: auto; 
        }

        .bank-alamat { 
            position: absolute; 
            top: 80mm; 
            left: 20mm; 
            max-width: 90mm;
            font-weight: bold; 
            white-space: normal; 
            word-wrap: break-word; 
            line-height: 1.2; 
            display: -webkit-box; 
            -webkit-line-clamp: 2; 
            -webkit-box-orient: vertical; 
            overflow: hidden; 
        }

        .swift { 
            position: absolute; 
            top: 87mm; 
            left: 20mm; 
            font-weight: bold; 
            white-space: nowrap; 
            max-width: 90mm; 
            overflow-x: auto; 
        }

        .negara { 
            position: absolute; 
            top: 92mm; 
            left: 20mm; 
            font-weight: bold; 
            white-space: nowrap; 
            max-width: 90mm; 
            overflow-x: auto; 
        }

        .berita { 
            position: absolute; 
            top: 98mm; 
            left: 20mm;
            font-weight: bold; 
            white-space: nowrap; 
            max-width: 90mm; 
            overflow-x: auto; 
        }

        .tujuan { 
            position: absolute; 
            top: 105mm; 
            left: 30mm; 
            font-weight: bold; 
            white-space: nowrap; 
            max-width: 90mm; 
            overflow-x: auto; 
        }

        .pengirim { 
            position: absolute; 
            top: 120mm; 
            left: 28mm; 
            font-weight: bold; 
            white-space: nowrap; 
            max-width: 90mm; 
            overflow-x: auto; 
        }

        .deretan-angka { 
            position: absolute; 
            top: 129mm; 
            left: 30mm; 
            font-weight: bold; 
            letter-spacing: 5px; 
            white-space: nowrap; 
            overflow-x: auto; 
            max-width: 90mm; 
        }

        /* ======================================== */
        /* KOLOM KANAN - REFERENSI & TOTAL */
        /* ======================================== */

        .ref-no-cek { 
            position: absolute; 
            top: 69mm; 
            left: 110mm;
            font-weight: bold; 
            text-align: left; 
        }

        .ref-norek-pengirim { 
            position: absolute; 
            top: 69mm; 
            left: 135mm; 
            text-align: left; 
            font-size: 11pt; 
            font-weight: bold;
        }

        .ref-total-pertama { 
            position: absolute; 
            top: 69mm; 
            left: 170mm; 
            text-align: left; 
            font-size: 10pt; 
            font-weight: bold; 
            color: #000; 
        }

        .ref-total-kedua { 
            position: absolute; 
            top: 80mm; 
            left: 157mm; 
            text-align: left; 
            font-size: 10pt; 
            font-weight: bold; 
            color: #000; 
        }

        /* ======================================== */
        /* RINCIAN BIAYA - BONGKARAN */
        /* ======================================== */

        .rincian-bongkaran {
            position: absolute;
            top: 110mm;
            left: 130mm;
            width: auto;
            font-size: 8pt;
            font-weight: bold;
        }

        .baris-total {
            display: none !important;
        }

        .rincian-wrapper {
            position: relative;
            width: 100%;
            height: 30mm;
        }

        .baris-rincian, .baris-total {
            position: absolute;
            left: 0;
            display: flex;
            flex-direction: row;
            gap: 5mm;
            white-space: nowrap;
        }

        .baris-1 { top: 0mm; left: 0mm; }
        .baris-2 { top: 6mm; left: 0mm; }
        .baris-3 { top: 12mm; left: 0mm; }
        .baris-total { top: 18mm; left: 0mm; font-weight: bold; }

        .valuta-col { width: 10mm; text-align: left; }
        .kurs-col   { width: 25mm; text-align: right; }
        .nilai-col  { width: 12mm; text-align: right; }

        /* ======================================== */
        /* WEB PREVIEW */
        /* ======================================== */
        @media screen {
            body { 
                width: 210mm;
                min-height: 297mm;
                margin: 20px auto;
                padding: 0;
                background: #e0e0e0;
                box-shadow: 0 0 15px rgba(0,0,0,0.2);
                transform: none;
                transform-origin: top left;
            }
            
            .print-container { 
                margin: 0 auto;
                box-shadow: 0 0 10px rgba(0,0,0,0.1);
            }
        }

        /* ======================================== */
        /* MEDIA PRINT */
        /* ======================================== */
        @media print { 
            body { 
                background: white; 
                margin: 0; 
                padding: 0; 
                box-shadow: none; 
                width: 210mm;
                min-height: 297mm;
            } 
            .print-container { 
                box-shadow: none; 
                padding: 5mm;
                margin: 0;
                width: 210mm;
                min-height: 297mm;
            } 
            @page { 
                size: A4 portrait;
                margin: 0;
            }
        }
    </style>
</head>
<body>
    <div id="printContainer"></div>
    <script>
        const params = new URLSearchParams(window.location.search);
        
        const data = {
            currency: params.get('currency') || 'USD',
            jumlah: parseFloat(params.get('jumlah')) || 0,
            terbilang: params.get('terbilang') || '-',
            nama: params.get('nama') || '-',
            account: params.get('account') || '-',
            alamat: params.get('alamat') || '-',
            bankName: params.get('bankName') || '-',
            bankAlamat: params.get('bankAlamat') || '-',
            swift: params.get('swift') || '',
            country: params.get('country') || '-',
            berita: params.get('berita') || '-',
            tujuan: params.get('tujuan') || '-',
            noLoa: params.get('noLoa') || '-',
            norekPengirim: params.get('norekPengirim') || '',
            pengirim: params.get('pengirim') || '-',
            biayaTelex: parseFloat(params.get('biayaTelex')) || 0,
            metodeTransfer: params.get('metodeTransfer') || 'SHARE',
            biayaFullAmount: parseFloat(params.get('biayaFullAmount')) || 0,
            jenis: params.get('jenis') || 'transfer',
            kurs: parseFloat(params.get('kurs')) || 0,
            jumlahIDR: parseFloat(params.get('jumlahIDR')) || 0
        };

        // ========== FORMAT ANGKA (FORMAT INDONESIA) ==========
        // Pemisah ribuan = titik (.), pemisah desimal = koma (,)
        // Desimal tetap 2 digit jika ada nilai desimal
        const formatAngka = (angka, curr) => {
            if (isNaN(angka) || angka === 0) return '0';
            
            const hasDecimal = angka % 1 !== 0;
            
            // Semua currency pakai format Indonesia (titik ribuan, koma desimal)
            if (hasDecimal) {
                return angka.toLocaleString('id-ID', { 
                    minimumFractionDigits: 2, 
                    maximumFractionDigits: 2 
                });
            } else {
                return angka.toLocaleString('id-ID', { 
                    minimumFractionDigits: 0, 
                    maximumFractionDigits: 0 
                });
            }
        };
        // ========== FORMAT KURS ==========
        const formatKurs = (angka) => {
            if (isNaN(angka) || angka === 0) return '0';
            const hasDecimal = angka % 1 !== 0;
            if (hasDecimal) {
                return angka.toLocaleString('id-ID', { 
                    minimumFractionDigits: 2, 
                    maximumFractionDigits: 2 
                });
            } else {
                return angka.toLocaleString('id-ID', { 
                    minimumFractionDigits: 0, 
                    maximumFractionDigits: 0 
                });
            }
        };
        // ========== FORMAT ANGKA PINTAR ==========
        const formatAngkaPintar = (angka, currency) => {
            if (isNaN(angka) || angka === 0) return '0';
            const hasDecimal = angka % 1 !== 0;
            
            // Semua currency pakai format Indonesia
            if (hasDecimal) {
                return angka.toLocaleString('id-ID', { 
                    minimumFractionDigits: 2, 
                    maximumFractionDigits: 2 
                });
            } else {
                return angka.toLocaleString('id-ID', { 
                    minimumFractionDigits: 0, 
                    maximumFractionDigits: 0 
                });
            }
        };
        const formattedJumlah = formatAngka(data.jumlah, data.currency);
        const formattedBiayaFull = formatAngka(data.biayaFullAmount, data.currency);
        const formattedBiayaTelex = data.biayaTelex.toLocaleString('id-ID', {minimumFractionDigits: 0, maximumFractionDigits: 0});
        const formattedKurs = formatKurs(data.kurs);
        
        // Hitung nilai IDR untuk full amount jika ada kurs
        let formattedBiayaFullIDR = '0';
        let biayaFullIDRValue = 0;
        if (data.kurs > 0 && data.biayaFullAmount > 0) {
            biayaFullIDRValue = data.biayaFullAmount * data.kurs;
            formattedBiayaFullIDR = formatAngka(biayaFullIDRValue, 'IDR');
        }
        
        let showBiayaFull = false;
        if (data.metodeTransfer === 'FULL_AMOUNT') {
            showBiayaFull = true;
        }
        
        const norekFormat = data.norekPengirim.split('').join(' ');
        
        // ========== 3 KONDISI ==========
        const isPembelianValas = (data.jenis === 'valas');
        const isTransferValas = (!isPembelianValas && data.kurs > 0 && data.currency !== 'IDR');
        const isTransferBiasa = (!isPembelianValas && !isTransferValas);
        
        let totalDisplay = '';
        let rincianHtml = '';
        
        // ========== KONDISI 1: PEMBELIAN VALAS ==========
        if (isPembelianValas) {
            let nilaiEkuivalen = data.jumlahIDR;
            let totalNilai = nilaiEkuivalen;
            
            rincianHtml = `
                <div class="rincian-bongkaran">
                    <div class="rincian-wrapper">
                        <div class="baris-rincian baris-1">
                            <span class="valuta-col">${data.currency} ${formattedJumlah}</span>
                            <span class="kurs-col">${formattedKurs}</span>
                            <span class="nilai-col">IDR ${formatAngka(nilaiEkuivalen, 'IDR')}</span>
                        </div>
                        <div class="baris-total" style="top: 8mm;">
                            <span class="valuta-col">Total</span>
                            <span class="kurs-col"></span>
                            <span class="nilai-col">IDR ${formatAngka(totalNilai, 'IDR')}</span>
                        </div>
                    </div>
                </div>
            `;
            totalDisplay = `IDR ${formatAngka(totalNilai, 'IDR')}`;
        }
        
        // ========== KONDISI 2: TRANSFER VALAS (IDR → USD/EUR) ==========
        else if (isTransferValas) {
            let totalNilaiEkuivalen = 0;
            let rowsHtml = '';
            
            // BARIS 1: Jumlah Transfer (jumlah × kurs)
            let baris1Nilai = data.jumlah * data.kurs;
            let formattedBaris1Nilai = formatAngka(baris1Nilai, 'IDR');
            rowsHtml += `
                <div class="baris-rincian baris-1">
                    <span class="valuta-col">${data.currency} ${formattedJumlah}</span>
                    <span class="kurs-col">${formattedKurs}</span>
                    <span class="nilai-col">IDR ${formattedBaris1Nilai}</span>
                </div>
            `;
            totalNilaiEkuivalen += baris1Nilai;
            
            // BARIS 2: Full Amount
            if (showBiayaFull) {
                rowsHtml += `
                    <div class="baris-rincian baris-2">
                        <span class="valuta-col">${data.currency} ${formattedBiayaFull}</span>
                        <span class="kurs-col">${formattedKurs}</span>
                        <span class="nilai-col">IDR ${formattedBiayaFullIDR}</span>
                    </div>
                `;
                totalNilaiEkuivalen += biayaFullIDRValue;
            }
            
            // BARIS 3: Biaya Telex
            if (data.biayaTelex > 0) {
                rowsHtml += `
                    <div class="baris-rincian baris-3">
                        <span class="valuta-col"></span>
                        <span class="kurs-col"></span>
                        <span class="nilai-col">IDR ${formattedBiayaTelex}</span>
                    </div>
                `;
                totalNilaiEkuivalen += data.biayaTelex;
            }
            
            // TOTAL - PAKAI formatAngka
            let totalValue = `IDR ${formatAngka(totalNilaiEkuivalen, 'IDR')}`;
            rowsHtml += `
                <div class="baris-total">
                    <span class="valuta-col">Total</span>
                    <span class="kurs-col"></span>
                    <span class="nilai-col">${totalValue}</span>
                </div>
            `;
            
            rincianHtml = `<div class="rincian-bongkaran"><div class="rincian-wrapper">${rowsHtml}</div></div>`;
            totalDisplay = totalValue;
        }
        
        // ========== KONDISI 3: TRANSFER BIASA (USD→USD, EUR→EUR) ==========
        else {
            let totalNilaiEkuivalenUSD = 0;
            let rowsHtml = '';
            
            // ========== HIDE VALAS UNTUK KONDISI 3 ==========
            const hideValas = true;
            
            // BARIS 1: Jumlah Transfer
            rowsHtml += `
                <div class="baris-rincian baris-1">
                    <span class="valuta-col">${hideValas ? '' : data.currency + ' ' + formattedJumlah}</span>
                    <span class="kurs-col"></span>
                    <span class="nilai-col">${data.currency} ${formattedJumlah}</span>
                </div>
            `;
            totalNilaiEkuivalenUSD += data.jumlah;
            
            // BARIS 2: Full Amount
            if (showBiayaFull) {
                rowsHtml += `
                    <div class="baris-rincian baris-2">
                        <span class="valuta-col">${hideValas ? '' : data.currency + ' ' + formattedBiayaFull}</span>
                        <span class="kurs-col"></span>
                        <span class="nilai-col">${data.currency} ${formattedBiayaFull}</span>
                    </div>
                `;
                totalNilaiEkuivalenUSD += data.biayaFullAmount;
            }
            
            // BARIS 3: Biaya Telex
            if (data.biayaTelex > 0) {
                rowsHtml += `
                    <div class="baris-rincian baris-3">
                        <span class="valuta-col"></span>
                        <span class="kurs-col"></span>
                        <span class="nilai-col">IDR ${formattedBiayaTelex}</span>
                    </div>
                `;
            }
            
            // TOTAL - PAKAI formatAngka
            let totalValue = `${data.currency} ${formatAngka(totalNilaiEkuivalenUSD, data.currency)}`;
            rowsHtml += `
                <div class="baris-total">
                    <span class="valuta-col">${hideValas ? '' : 'Total'}</span>
                    <span class="kurs-col"></span>
                    <span class="nilai-col">${totalValue}</span>
                </div>
            `;
            
            rincianHtml = `<div class="rincian-bongkaran"><div class="rincian-wrapper">${rowsHtml}</div></div>`;
            totalDisplay = totalValue;
        }

            // ========== FORMAT TOTAL DENGAN ANGKA PINTAR ==========
            let totalDisplayFormatted = '';

            // Format total berdasarkan currency
            if (totalDisplay.includes('IDR')) {
                // Jika total dalam IDR
                const angkaTotal = parseFloat(totalDisplay.replace(/[^0-9,.]/g, '').replace(/\./g, '').replace(/,/g, '.'));
                totalDisplayFormatted = `IDR ${formatAngkaPintar(angkaTotal, 'IDR')}`;
            } else {
                // Jika total dalam USD/EUR - PERBAIKAN PARSING
                const match = totalDisplay.match(/([A-Z]+)\s+([\d.,]+)/);
                if (match) {
                    const currency = match[1];
                    const angkaStr = match[2].replace(/\./g, '').replace(/,/g, '.');
                    const angkaTotal = parseFloat(angkaStr);
                    totalDisplayFormatted = `${currency} ${formatAngkaPintar(angkaTotal, currency)}`;
                } else {
                    totalDisplayFormatted = totalDisplay;
                }
            }

        const html = `
            <div class="print-container">
                <!-- KIRI -->
                <div class="currency">${data.currency}</div>
                <div class="jumlah-angka">${formattedJumlah}</div>
                <div class="terbilang">${data.terbilang}</div>
                
                <div class="nama-penerima">${data.nama}</div>
                <div class="account">${data.account}</div>
                <div class="alamat">${data.alamat}</div>
                
                <div class="bank-name">${data.bankName}</div>
                <div class="bank-alamat">${data.bankAlamat}</div>
                <div class="swift">${data.swift}</div>
                <div class="negara">${data.country}</div>
                
                <div class="berita">${data.berita}</div>
                <div class="tujuan">${data.tujuan}</div>
                
                <div class="pengirim">${data.pengirim}</div>
                <div class="deretan-angka">${norekFormat}</div>
                
                <!-- KANAN -->
                <div class="ref-no-cek">${data.noLoa}</div>
                <div class="ref-norek-pengirim">${data.norekPengirim}</div>
                <div class="ref-total-pertama">${totalDisplayFormatted}</div>
                <div class="ref-total-kedua">${totalDisplayFormatted}</div>
                
                ${rincianHtml}
            </div>
        `;
        
        document.getElementById('printContainer').innerHTML = html;
    </script>
</body>
</html>
