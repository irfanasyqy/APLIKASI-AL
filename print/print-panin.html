<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Print Bank Panin</title>
    <style>
       /* ======================================== */
/* RESET & DASAR */
/* ======================================== */
* { 
    margin: 0; 
    padding: 0; 
    box-sizing: border-box; 
}

body { 
    font-family: 'Courier New', monospace; 
    font-size: 10pt; 
    width: 210mm; 
    min-height: 297mm; 
    margin: 20px auto; 
    padding: 10mm; 
    background: #e0e0e0; 
    box-shadow: 0 0 15px rgba(0,0,0,0.2); 
}

.print-container { 
    background: white; 
    width: 100%; 
    min-height: 277mm; 
    position: relative; 
    padding: 5mm; 
    box-shadow: 0 0 5px rgba(0,0,0,0.1); 
}

/* ======================================== */
/* KOLOM KIRI - DATA PENGIRIM & PENERIMA */
/* ======================================== */

/* Baris 1: Mata Uang & Jumlah */
.currency { 
    position: absolute; 
    top: 43mm; 
    left: 20mm; 
    font-size: 11pt; 
    font-weight: bold; 
    white-space: nowrap; 
}

.jumlah-angka { 
    position: absolute; 
    top: 43mm; 
    left: 40mm; 
    font-size: 11pt; 
    font-weight: bold; 
    white-space: nowrap; 
}

/* Baris 2: Terbilang (bisa 2 baris) */
.terbilang { 
    position: absolute; 
    top: 51mm; 
    left: 20mm; 
    font-size: 11pt; 
    max-width: 80mm; 
    white-space: normal; 
    word-wrap: break-word; 
    line-height: 1.2; 
    display: -webkit-box; 
    -webkit-line-clamp: 2; 
    -webkit-box-orient: vertical; 
    overflow: hidden; 
}

/* Baris 3: Nama Penerima */
.nama-penerima { 
    position: absolute; 
    top: 65mm; 
    left: 20mm; 
    font-weight: bold; 
    white-space: nowrap; 
    max-width: 90mm; 
    overflow-x: auto; 
}

/* Baris 4: No Rekening Penerima */
.account { 
    position: absolute; 
    top: 73mm; 
    left: 20mm; 
    white-space: nowrap; 
    max-width: 90mm; 
    overflow-x: auto; 
}

/* Baris 5: Alamat Penerima (bisa 2 baris) */
.alamat { 
    position: absolute; 
    top: 78mm; 
    left: 20mm; 
    max-width: 90mm; 
    white-space: normal; 
    word-wrap: break-word; 
    line-height: 1.2; 
    display: -webkit-box; 
    -webkit-line-clamp: 2; 
    -webkit-box-orient: vertical; 
    overflow: hidden; 
}

/* Baris 6: Nama Bank */
.bank-name { 
    position: absolute; 
    top: 90mm; 
    left: 20mm; 
    font-weight: bold; 
    white-space: nowrap; 
    max-width: 90mm; 
    overflow-x: auto; 
}

/* Baris 7: Alamat Bank (bisa 2 baris) */
.bank-alamat { 
    position: absolute; 
    top: 95mm; 
    left: 20mm; 
    max-width: 90mm; 
    white-space: normal; 
    word-wrap: break-word; 
    line-height: 1.2; 
    display: -webkit-box; 
    -webkit-line-clamp: 2; 
    -webkit-box-orient: vertical; 
    overflow: hidden; 
}

/* Baris 8: SWIFT Code */
.swift { 
    position: absolute; 
    top: 103mm; 
    left: 20mm; 
    white-space: nowrap; 
    max-width: 90mm; 
    overflow-x: auto; 
}

/* Baris 9: Negara */
.negara { 
    position: absolute; 
    top: 108mm; 
    left: 20mm; 
    white-space: nowrap; 
    max-width: 90mm; 
    overflow-x: auto; 
}

/* Baris 10: Berita Transfer */
.berita { 
    position: absolute; 
    top: 115mm; 
    left: 20mm; 
    white-space: nowrap; 
    max-width: 90mm; 
    overflow-x: auto; 
}

/* Baris 11: Tujuan Transfer */
.tujuan { 
    position: absolute; 
    top: 125mm; 
    left: 20mm; 
    white-space: nowrap; 
    max-width: 90mm; 
    overflow-x: auto; 
}

/* Baris 12: Nama Pengirim */
.pengirim { 
    position: absolute; 
    top: 142mm; 
    left: 20mm; 
    font-weight: bold; 
    white-space: nowrap; 
    max-width: 90mm; 
    overflow-x: auto; 
}

/* Baris 13: No Rekening Pengirim (dengan spasi) */
.deretan-angka { 
    position: absolute; 
    top: 152mm; 
    left: 30mm; 
    letter-spacing: 5px; 
    white-space: nowrap; 
    overflow-x: auto; 
    max-width: 90mm; 
}

/* ======================================== */
/* KOLOM KANAN - REFERENSI & TOTAL */
/* ======================================== */
.ref-no-cek { 
    position: absolute; 
    top: 82mm; 
    left: 124mm; 
    text-align: left; 
}

.ref-norek-pengirim { 
    position: absolute; 
    top: 82mm; 
    left: 150mm; 
    text-align: left; 
    font-size: 11pt; 
}

.ref-total { 
    position: absolute; 
    top: 82mm; 
    left: 170mm; 
    text-align: left; 
    font-size: 11pt; 
    font-weight: bold; 
    color: #000; 
}

/* Container utama rincian biaya */
.rincian-bongkaran {
    position: absolute;
    top: 127mm;
    left: 150mm;   /* posisi awal container */
    width: auto;
}
/* Container untuk membungkus semua baris (biar posisi absolut baris relatif ke sini) */
.rincian-wrapper {
    position: relative;   /* ← INI PENTING! */
    width: 100%;
    height: 25mm;
}

/* Style untuk setiap baris rincian */
.baris-rincian, .baris-total {
    position: absolute;
    white-space: nowrap;
}

/* POSISI TOP & LEFT MASING-MASING BARIS */
.baris-1 { 
    top: 0mm; 
    left: 0mm; 
}
.baris-2 { 
    top: 6mm; 
    left: 5mm;      /* ← atur left di sini */
}
.baris-3 { 
    top: 12mm; 
    left: 10mm;     /* ← atur left di sini */
}
.baris-total { 
    top: 18mm; 
    left: 0mm; 
}

/* Kolom dalam satu baris (pakai flex) */
.baris-rincian, .baris-total {
    display: flex;
    flex-direction: row;
    gap: 5mm;
}

.valuta-col {
    width: 35mm;
    text-align: left;
}

.kurs-col {
    width: 25mm;
    text-align: right;
}

.nilai-col {
    width: 55mm;
    text-align: right;
}

/* ======================================== */
/* MEDIA PRINT - SAAT DI CETAK */
/* ======================================== */
@media print { 
    body { 
        background: white; 
        margin: 0; 
        padding: 0; 
        box-shadow: none; 
    } 
    .print-container { 
        box-shadow: none; 
        padding: 0; 
    } 
    @page { 
        size: A4; 
        margin: 0; 
    } 
}
      
    </style>
</head>
<body>
    <div id="printContainer"></div>
    <script>
        const params = new URLSearchParams(window.location.search);
        
        const data = {
            currency: params.get('currency') || 'USD',
            jumlah: parseFloat(params.get('jumlah')) || 0,
            terbilang: params.get('terbilang') || '-',
            nama: params.get('nama') || '-',
            account: params.get('account') || '-',
            alamat: params.get('alamat') || '-',
            bankName: params.get('bankName') || '-',
            bankAlamat: params.get('bankAlamat') || '-',
            swift: params.get('swift') || '-',
            country: params.get('country') || '-',
            berita: params.get('berita') || '-',
            tujuan: params.get('tujuan') || '-',
            noLoa: params.get('noLoa') || '-',
            norekPengirim: params.get('norekPengirim') || '',
            pengirim: params.get('pengirim') || '-',
            biayaTelex: parseFloat(params.get('biayaTelex')) || 0,
            metodeTransfer: params.get('metodeTransfer') || 'SHARE',
            biayaFullAmount: parseFloat(params.get('biayaFullAmount')) || 0,
            jenis: params.get('jenis') || 'transfer',
            kurs: parseFloat(params.get('kurs')) || 0,
            jumlahIDR: parseFloat(params.get('jumlahIDR')) || 0
        };
        
        // Format angka dengan desimal untuk USD/EUR
        const formatAngka = (angka, curr) => {
            if (curr === 'IDR') {
                return angka.toLocaleString('id-ID', {minimumFractionDigits: 0, maximumFractionDigits: 0});
            } else {
                return angka.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
            }
        };
        
        const formatKurs = (k) => k.toLocaleString('id-ID', {minimumFractionDigits: 0, maximumFractionDigits: 0});
        
        const formattedJumlah = formatAngka(data.jumlah, data.currency);
        const formattedBiayaFull = formatAngka(data.biayaFullAmount, data.currency);
        const formattedBiayaTelex = data.biayaTelex.toLocaleString('id-ID', {minimumFractionDigits: 0});
        const formattedKurs = formatKurs(data.kurs);
        const formattedJumlahIDR = formatAngka(data.jumlahIDR, 'IDR');
        
        // Hitung nilai IDR untuk full amount jika ada kurs
        let formattedBiayaFullIDR = '0';
        let biayaFullIDRValue = 0;
        if (data.kurs > 0 && data.biayaFullAmount > 0) {
            biayaFullIDRValue = data.biayaFullAmount * data.kurs;
            formattedBiayaFullIDR = formatAngka(biayaFullIDRValue, 'IDR');
        }
        
        // Hitung jumlah akhir (untuk total)
        let jumlahAkhir = data.jumlah;
        let showBiayaFull = false;
        if (data.metodeTransfer === 'FULL_AMOUNT') {
            jumlahAkhir = data.jumlah + data.biayaFullAmount;
            showBiayaFull = true;
        }
        
        const norekFormat = data.norekPengirim.split('').join(' ');
        
        // ========== 3 KONDISI (BERDASARKAN KURS DAN JUMLAHIDR) ==========
        const isPembelianValas = (data.jenis === 'valas');
        const isTransferValas = (!isPembelianValas && data.kurs > 0 && data.jumlahIDR > 0);
        const isTransferBiasa = (!isPembelianValas && !isTransferValas);
        
        // Variabel untuk total
        let totalDisplay = '';
        let rincianHtml = '';
        
        // ========== KONDISI 1: PEMBELIAN VALAS ==========
        if (isPembelianValas) {
            let nilaiEkuivalen = data.jumlahIDR;
            let totalNilai = nilaiEkuivalen;
            
            rincianHtml = `
                <table style="margin-left: auto;">
                    <thead>
                        <tr><th></th><th>Kurs</th><th></th></tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td class="currency-col">${data.currency} ${formattedJumlah}</td>
                            <td class="kurs-col">${formattedKurs}</td>
                            <td class="jumlah-col">IDR ${formatAngka(nilaiEkuivalen, 'IDR')}</td>
                        </tr>
                    </tbody>
                </table>
            `;
            totalDisplay = `IDR ${formatAngka(totalNilai, 'IDR')}`;
        }
        
        // ========== KONDISI 2: TRANSFER VALAS (IDR → USD/EUR) ==========
        else if (isTransferValas) {
            let totalNilaiEkuivalen = 0;
            let rows = '';
            
            // BARIS 1: Jumlah Transfer (hitung ulang: jumlah × kurs)
            let baris1Nilai = data.jumlah * data.kurs;
            let formattedBaris1Nilai = formatAngka(baris1Nilai, 'IDR');
            rows += `<tr><td class="currency-col">${data.currency} ${formattedJumlah}</td><td class="kurs-col">${formattedKurs}</td><td class="jumlah-col">IDR ${formattedBaris1Nilai}</td></tr>`;
            totalNilaiEkuivalen += baris1Nilai;
            
            // BARIS 2: Full Amount (biayaFullAmount × kurs)
            if (showBiayaFull) {
                rows += `<tr><td class="currency-col">${data.currency} ${formattedBiayaFull}</td><td class="kurs-col">${formattedKurs}</td><td class="jumlah-col">IDR ${formattedBiayaFullIDR}</td></tr>`;
                totalNilaiEkuivalen += biayaFullIDRValue;
            }
            
            // BARIS 3: Biaya Telex
            if (data.biayaTelex > 0) {
                rows += `<tr class="telex-row"><td class="currency-col"></td><td class="kurs-col"></td><td class="jumlah-col">IDR ${formattedBiayaTelex}</td></tr>`;
                totalNilaiEkuivalen += data.biayaTelex;
            }
            
            // Total
            let totalValue = `IDR ${totalNilaiEkuivalen.toLocaleString('id-ID', {minimumFractionDigits: 0})}`;
            rows += `<tr class="total-row"><td class="currency-col"><strong></strong></td><td class="kurs-col"></td><td class="jumlah-col"><strong>${totalValue}</strong></td></tr>`;
            
            rincianHtml = `<table style="margin-left: auto;"><thead><tr><th></th><th></th><th></th></tr></thead><tbody>${rows}</tbody></table>`;
            totalDisplay = totalValue;
        }
        
        // ========== KONDISI 3: TRANSFER BIASA (USD→USD, EUR→EUR) ==========
        else {
            let totalNilaiEkuivalenUSD = 0;
            let rows = '';
            
            // BARIS 1: Jumlah Transfer
            rows += `<tr><td class="currency-col">${data.currency} ${formattedJumlah}</td><td class="kurs-col"></td><td class="jumlah-col">${data.currency} ${formattedJumlah}<tr></tr>`;
            totalNilaiEkuivalenUSD += data.jumlah;
            
            // BARIS 2: Full Amount
            if (showBiayaFull) {
                rows += `<tr><td class="currency-col">${data.currency} ${formattedBiayaFull}</td><td class="kurs-col"></td><td class="jumlah-col">${data.currency} ${formattedBiayaFull}</td></tr>`;
                totalNilaiEkuivalenUSD += data.biayaFullAmount;
            }
            
            // BARIS 3: Biaya Telex (TIDAK dimasukkan ke total USD)
            if (data.biayaTelex > 0) {
                rows += `<tr class="telex-row"><td class="currency-col"></td><td class="kurs-col"></td><td class="jumlah-col">IDR ${formattedBiayaTelex}<table></tr>`;
            }
            
            // Total (HANYA USD, tanpa telex)
            let totalValue = `${data.currency} ${totalNilaiEkuivalenUSD.toLocaleString('en-US', {minimumFractionDigits: 2})}`;
            rows += `<tr class="total-row"><td class="currency-col"><strong>Total</strong></td><td class="kurs-col"></td><td class="jumlah-col"><strong>${totalValue}</strong></td></tr>`;
            
            rincianHtml = `<table style="margin-left: auto;"><thead><tr><th></th><th></th><th></th></tr></thead><tbody>${rows}</tbody></tr>`;
            totalDisplay = totalValue;
        }
        
        const html = `
            <div class="print-container">
                <!-- KIRI -->
                <div class="currency">${data.currency}</div>
                <div class="jumlah-angka">${formattedJumlah}</div>
                <div class="terbilang">${data.terbilang}</div>
                
                <div class="nama-penerima">${data.nama}</div>
                <div class="account">${data.account}</div>
                <div class="alamat">${data.alamat}</div>
                
                <div class="bank-name">${data.bankName}</div>
                <div class="bank-alamat">${data.bankAlamat}</div>
                <div class="swift">${data.swift}</div>
                <div class="negara">${data.country}</div>
                
                <div class="berita">${data.berita}</div>
                <div class="tujuan">${data.tujuan}</div>
                
                <div class="pengirim">${data.pengirim}</div>
                <div class="deretan-angka">${norekFormat}</div>
                
                <!-- KANAN -->
                <div class="ref-no-cek">${data.noLoa}</div>
                <div class="ref-norek-pengirim">${data.norekPengirim}</div>
                <div class="ref-total">${totalDisplay}</div>
                
                <div class="rincian-biaya">${rincianHtml}</div>
            </div>
        `;
        
        document.getElementById('printContainer').innerHTML = html;
    </script>
</body>
</html>
