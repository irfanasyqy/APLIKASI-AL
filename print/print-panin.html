<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Print Bank Panin</title>
    <style>
        /* ======================================== */
/* RESET & DASAR */
/* ======================================== */
* { 
    margin: 0; 
    padding: 0; 
    box-sizing: border-box; 
}

body { 
    font-family: 'Courier New', monospace; 
    font-size: 10pt; 
    width: 210mm; 
    min-height: 297mm; 
    margin: 20px auto; 
    padding: 10mm; 
    background: #e0e0e0; 
    box-shadow: 0 0 15px rgba(0,0,0,0.2); 
}

.print-container { 
    background: white; 
    width: 100%; 
    min-height: 277mm; 
    position: relative; 
    padding: 5mm; 
    box-shadow: 0 0 5px rgba(0,0,0,0.1); 
}

/* ======================================== */
/* KOLOM KIRI - DATA PENGIRIM & PENERIMA */
/* ======================================== */

/* ----- BARIS 1: MATA UANG & JUMLAH ----- */
.currency { 
    position: absolute; 
    top: 43mm; 
    left: 20mm; 
    font-size: 11pt; 
    font-weight: bold; 
    white-space: nowrap; 
}

.jumlah-angka { 
    position: absolute; 
    top: 43mm; 
    left: 40mm; 
    font-size: 11pt; 
    font-weight: bold; 
    white-space: nowrap; 
}

/* ----- BARIS 2: TERBILANG (bisa 2 baris) ----- */
.terbilang { 
    position: absolute; 
    top: 51mm; 
    left: 20mm; 
    font-size: 11pt; 
    max-width: 80mm; 
    white-space: normal; 
    word-wrap: break-word; 
    line-height: 1.2; 
    display: -webkit-box; 
    -webkit-line-clamp: 2; 
    -webkit-box-orient: vertical; 
    overflow: hidden; 
}

/* ----- BARIS 3: NAMA PENERIMA ----- */
.nama-penerima { 
    position: absolute; 
    top: 65mm; 
    left: 20mm; 
    font-weight: bold; 
    white-space: nowrap; 
    max-width: 90mm; 
    overflow-x: auto; 
}

/* ----- BARIS 4: NO REKENING PENERIMA ----- */
.account { 
    position: absolute; 
    top: 73mm; 
    left: 20mm; 
    white-space: nowrap; 
    max-width: 90mm; 
    overflow-x: auto; 
}

/* ----- BARIS 5: ALAMAT PENERIMA (bisa 2 baris) ----- */
.alamat { 
    position: absolute; 
    top: 78mm; 
    left: 20mm; 
    max-width: 90mm; 
    white-space: normal; 
    word-wrap: break-word; 
    line-height: 1.2; 
    display: -webkit-box; 
    -webkit-line-clamp: 2; 
    -webkit-box-orient: vertical; 
    overflow: hidden; 
}

/* ----- BARIS 6: NAMA BANK ----- */
.bank-name { 
    position: absolute; 
    top: 90mm; 
    left: 20mm; 
    font-weight: bold; 
    white-space: nowrap; 
    max-width: 90mm; 
    overflow-x: auto; 
}

/* ----- BARIS 7: ALAMAT BANK (bisa 2 baris) ----- */
.bank-alamat { 
    position: absolute; 
    top: 95mm; 
    left: 20mm; 
    max-width: 90mm; 
    white-space: normal; 
    word-wrap: break-word; 
    line-height: 1.2; 
    display: -webkit-box; 
    -webkit-line-clamp: 2; 
    -webkit-box-orient: vertical; 
    overflow: hidden; 
}

/* ----- BARIS 8: SWIFT CODE ----- */
.swift { 
    position: absolute; 
    top: 103mm; 
    left: 20mm; 
    white-space: nowrap; 
    max-width: 90mm; 
    overflow-x: auto; 
}

/* ----- BARIS 9: NEGARA ----- */
.negara { 
    position: absolute; 
    top: 108mm; 
    left: 20mm; 
    white-space: nowrap; 
    max-width: 90mm; 
    overflow-x: auto; 
}

/* ----- BARIS 10: BERITA TRANSFER ----- */
.berita { 
    position: absolute; 
    top: 115mm; 
    left: 20mm; 
    white-space: nowrap; 
    max-width: 90mm; 
    overflow-x: auto; 
}

/* ----- BARIS 11: TUJUAN TRANSFER ----- */
.tujuan { 
    position: absolute; 
    top: 125mm; 
    left: 20mm; 
    white-space: nowrap; 
    max-width: 90mm; 
    overflow-x: auto; 
}

/* ----- BARIS 12: NAMA PENGIRIM ----- */
.pengirim { 
    position: absolute; 
    top: 142mm; 
    left: 20mm; 
    font-weight: bold; 
    white-space: nowrap; 
    max-width: 90mm; 
    overflow-x: auto; 
}

/* ----- BARIS 13: NO REKENING PENGIRIM (dengan spasi) ----- */
.deretan-angka { 
    position: absolute; 
    top: 152mm; 
    left: 30mm; 
    letter-spacing: 5px; 
    white-space: nowrap; 
    overflow-x: auto; 
    max-width: 90mm; 
}

/* ======================================== */
/* KOLOM KANAN - REFERENSI & TOTAL */
/* ======================================== */

.ref-no-cek { 
    position: absolute; 
    top: 82mm; 
    left: 124mm; 
    text-align: left; 
}

.ref-norek-pengirim { 
    position: absolute; 
    top: 82mm; 
    left: 150mm; 
    text-align: left; 
    font-size: 11pt; 
}

.ref-total { 
    position: absolute; 
    top: 82mm; 
    left: 170mm; 
    text-align: left; 
    font-size: 11pt; 
    font-weight: bold; 
    color: #000; 
}

/* ======================================== */
/* RINCIAN BIAYA - BONGKARAN (DIV + FLEX) */
/* ======================================== */

/* ----- CONTAINER UTAMA ----- */
.rincian-bongkaran {
    position: absolute;
    top: 127mm;
    left: 20mm;          /* <== ATUR POSISI KIRI DI SINI */
    width: auto;
}

/* ----- PEMBUNGKUS DENGAN POSITION RELATIVE ----- */
.rincian-wrapper {
    position: relative;
    width: 100%;
    height: 30mm;        /* <== ATUR TINGGI TOTAL AREA RINCIAN */
}

/* ----- BARIS RINCIAN & TOTAL ----- */
.baris-rincian, .baris-total {
    position: absolute;
    left: 0;
    display: flex;
    flex-direction: row;
    gap: 5mm;            /* <== JARAK ANTAR KOLOM */
    white-space: nowrap;
}

/* ----- POSISI TOP & LEFT MASING-MASING BARIS ----- */
.baris-1 { top: 0mm; left: 0mm; }      /* Baris 1: Jumlah Transfer */
.baris-2 { top: 6mm; left: 5mm; }      /* Baris 2: Full Amount */
.baris-3 { top: 12mm; left: 10mm; }    /* Baris 3: Biaya Telex */
.baris-total { top: 18mm; left: 0mm; font-weight: bold; }  /* Total */

/* ----- LEBAR KOLOM ----- */
.valuta-col { width: 35mm; text-align: left; }   /* Kolom 1: Valuta Asing */
.kurs-col   { width: 25mm; text-align: right; }  /* Kolom 2: Kurs */
.nilai-col  { width: 55mm; text-align: right; }  /* Kolom 3: Nilai Ekuivalen */

/* ======================================== */
/* MEDIA PRINT - SAAT DI CETAK */
/* ======================================== */
@media print { 
    body { 
        background: white; 
        margin: 0; 
        padding: 0; 
        box-shadow: none; 
    } 
    .print-container { 
        box-shadow: none; 
        padding: 0; 
    } 
    @page { 
        size: A4; 
        margin: 0; 
    } 
}
    </style>
</head>
<body>
    <div id="printContainer"></div>
    <script>
        const params = new URLSearchParams(window.location.search);
        
        const data = {
            currency: params.get('currency') || 'USD',
            jumlah: parseFloat(params.get('jumlah')) || 0,
            terbilang: params.get('terbilang') || '-',
            nama: params.get('nama') || '-',
            account: params.get('account') || '-',
            alamat: params.get('alamat') || '-',
            bankName: params.get('bankName') || '-',
            bankAlamat: params.get('bankAlamat') || '-',
            swift: params.get('swift') || '-',
            country: params.get('country') || '-',
            berita: params.get('berita') || '-',
            tujuan: params.get('tujuan') || '-',
            noLoa: params.get('noLoa') || '-',
            norekPengirim: params.get('norekPengirim') || '',
            pengirim: params.get('pengirim') || '-',
            biayaTelex: parseFloat(params.get('biayaTelex')) || 0,
            metodeTransfer: params.get('metodeTransfer') || 'SHARE',
            biayaFullAmount: parseFloat(params.get('biayaFullAmount')) || 0,
            jenis: params.get('jenis') || 'transfer',
            kurs: parseFloat(params.get('kurs')) || 0,
            jumlahIDR: parseFloat(params.get('jumlahIDR')) || 0
        };
        
        // Format angka dengan desimal untuk USD/EUR
        const formatAngka = (angka, curr) => {
            if (curr === 'IDR') {
                return angka.toLocaleString('id-ID', {minimumFractionDigits: 0, maximumFractionDigits: 0});
            } else {
                return angka.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
            }
        };
        
        const formatKurs = (k) => k.toLocaleString('id-ID', {minimumFractionDigits: 0, maximumFractionDigits: 0});
        
        const formattedJumlah = formatAngka(data.jumlah, data.currency);
        const formattedBiayaFull = formatAngka(data.biayaFullAmount, data.currency);
        const formattedBiayaTelex = data.biayaTelex.toLocaleString('id-ID', {minimumFractionDigits: 0});
        const formattedKurs = formatKurs(data.kurs);
        
        // Hitung nilai IDR untuk full amount jika ada kurs
        let formattedBiayaFullIDR = '0';
        let biayaFullIDRValue = 0;
        if (data.kurs > 0 && data.biayaFullAmount > 0) {
            biayaFullIDRValue = data.biayaFullAmount * data.kurs;
            formattedBiayaFullIDR = formatAngka(biayaFullIDRValue, 'IDR');
        }
        
        let showBiayaFull = false;
        if (data.metodeTransfer === 'FULL_AMOUNT') {
            showBiayaFull = true;
        }
        
        const norekFormat = data.norekPengirim.split('').join(' ');
        
        // ========== 3 KONDISI ==========
        const isPembelianValas = (data.jenis === 'valas');
        const isTransferValas = (!isPembelianValas && data.kurs > 0 && data.currency !== 'IDR');
        const isTransferBiasa = (!isPembelianValas && !isTransferValas);
        
        let totalDisplay = '';
        let rincianHtml = '';
        
        // ========== KONDISI 1: PEMBELIAN VALAS ==========
        if (isPembelianValas) {
            let nilaiEkuivalen = data.jumlahIDR;
            let totalNilai = nilaiEkuivalen;
            
            rincianHtml = `
                <div class="rincian-bongkaran">
                    <div class="rincian-wrapper">
                        <div class="baris-rincian baris-1">
                            <span class="valuta-col">${data.currency} ${formattedJumlah}</span>
                            <span class="kurs-col">${formattedKurs}</span>
                            <span class="nilai-col">IDR ${formatAngka(nilaiEkuivalen, 'IDR')}</span>
                        </div>
                        <div class="baris-total" style="top: 8mm;">
                            <span class="valuta-col">Total</span>
                            <span class="kurs-col"></span>
                            <span class="nilai-col">IDR ${formatAngka(totalNilai, 'IDR')}</span>
                        </div>
                    </div>
                </div>
            `;
            totalDisplay = `IDR ${formatAngka(totalNilai, 'IDR')}`;
        }
        
        // ========== KONDISI 2: TRANSFER VALAS (IDR → USD/EUR) ==========
        else if (isTransferValas) {
            let totalNilaiEkuivalen = 0;
            let rowsHtml = '';
            
            // BARIS 1: Jumlah Transfer (jumlah × kurs)
            let baris1Nilai = data.jumlah * data.kurs;
            let formattedBaris1Nilai = formatAngka(baris1Nilai, 'IDR');
            rowsHtml += `
                <div class="baris-rincian baris-1">
                    <span class="valuta-col">${data.currency} ${formattedJumlah}</span>
                    <span class="kurs-col">${formattedKurs}</span>
                    <span class="nilai-col">IDR ${formattedBaris1Nilai}</span>
                </div>
            `;
            totalNilaiEkuivalen += baris1Nilai;
            
            // BARIS 2: Full Amount
            if (showBiayaFull) {
                rowsHtml += `
                    <div class="baris-rincian baris-2">
                        <span class="valuta-col">${data.currency} ${formattedBiayaFull}</span>
                        <span class="kurs-col">${formattedKurs}</span>
                        <span class="nilai-col">IDR ${formattedBiayaFullIDR}</span>
                    </div>
                `;
                totalNilaiEkuivalen += biayaFullIDRValue;
            }
            
            // BARIS 3: Biaya Telex
            if (data.biayaTelex > 0) {
                rowsHtml += `
                    <div class="baris-rincian baris-3">
                        <span class="valuta-col"></span>
                        <span class="kurs-col"></span>
                        <span class="nilai-col">IDR ${formattedBiayaTelex}</span>
                    </div>
                `;
                totalNilaiEkuivalen += data.biayaTelex;
            }
            
            // TOTAL
            let totalValue = `IDR ${totalNilaiEkuivalen.toLocaleString('id-ID', {minimumFractionDigits: 0})}`;
            rowsHtml += `
                <div class="baris-total">
                    <span class="valuta-col">Total</span>
                    <span class="kurs-col"></span>
                    <span class="nilai-col">${totalValue}</span>
                </div>
            `;
            
            rincianHtml = `<div class="rincian-bongkaran"><div class="rincian-wrapper">${rowsHtml}</div></div>`;
            totalDisplay = totalValue;
        }
        
        // ========== KONDISI 3: TRANSFER BIASA (USD→USD, EUR→EUR) ==========
        else {
            let totalNilaiEkuivalenUSD = 0;
            let rowsHtml = '';
            
            // BARIS 1: Jumlah Transfer
            rowsHtml += `
                <div class="baris-rincian baris-1">
                    <span class="valuta-col">${data.currency} ${formattedJumlah}</span>
                    <span class="kurs-col"></span>
                    <span class="nilai-col">${data.currency} ${formattedJumlah}</span>
                </div>
            `;
            totalNilaiEkuivalenUSD += data.jumlah;
            
            // BARIS 2: Full Amount
            if (showBiayaFull) {
                rowsHtml += `
                    <div class="baris-rincian baris-2">
                        <span class="valuta-col">${data.currency} ${formattedBiayaFull}</span>
                        <span class="kurs-col"></span>
                        <span class="nilai-col">${data.currency} ${formattedBiayaFull}</span>
                    </div>
                `;
                totalNilaiEkuivalenUSD += data.biayaFullAmount;
            }
            
            // BARIS 3: Biaya Telex
            if (data.biayaTelex > 0) {
                rowsHtml += `
                    <div class="baris-rincian baris-3">
                        <span class="valuta-col"></span>
                        <span class="kurs-col"></span>
                        <span class="nilai-col">IDR ${formattedBiayaTelex}</span>
                    </div>
                `;
            }
            
            // TOTAL
            let totalValue = `${data.currency} ${totalNilaiEkuivalenUSD.toLocaleString('en-US', {minimumFractionDigits: 2})}`;
            rowsHtml += `
                <div class="baris-total">
                    <span class="valuta-col">Total</span>
                    <span class="kurs-col"></span>
                    <span class="nilai-col">${totalValue}</span>
                </div>
            `;
            
            rincianHtml = `<div class="rincian-bongkaran"><div class="rincian-wrapper">${rowsHtml}</div></div>`;
            totalDisplay = totalValue;
        }
        
        const html = `
            <div class="print-container">
                <!-- KIRI -->
                <div class="currency">${data.currency}</div>
                <div class="jumlah-angka">${formattedJumlah}</div>
                <div class="terbilang">${data.terbilang}</div>
                
                <div class="nama-penerima">${data.nama}</div>
                <div class="account">${data.account}</div>
                <div class="alamat">${data.alamat}</div>
                
                <div class="bank-name">${data.bankName}</div>
                <div class="bank-alamat">${data.bankAlamat}</div>
                <div class="swift">${data.swift}</div>
                <div class="negara">${data.country}</div>
                
                <div class="berita">${data.berita}</div>
                <div class="tujuan">${data.tujuan}</div>
                
                <div class="pengirim">${data.pengirim}</div>
                <div class="deretan-angka">${norekFormat}</div>
                
                <!-- KANAN -->
                <div class="ref-no-cek">${data.noLoa}</div>
                <div class="ref-norek-pengirim">${data.norekPengirim}</div>
                <div class="ref-total">${totalDisplay}</div>
                
                ${rincianHtml}
            </div>
        `;
        
        document.getElementById('printContainer').innerHTML = html;
    </script>
</body>
</html>
