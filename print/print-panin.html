<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Print Bank Panin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Courier New', monospace; font-size: 10pt; width: 210mm; min-height: 297mm; margin: 20px auto; padding: 10mm; background: #e0e0e0; box-shadow: 0 0 15px rgba(0,0,0,0.2); }
        .print-container { background: white; width: 100%; min-height: 277mm; position: relative; padding: 5mm; box-shadow: 0 0 5px rgba(0,0,0,0.1); }
        
        /* KIRI */
        .currency { position: absolute; top: 5mm; left: 20mm; font-size: 13pt; font-weight: bold; white-space: nowrap; }
        .jumlah-angka { position: absolute; top: 5mm; left: 40mm; font-size: 13pt; font-weight: bold; white-space: nowrap; }
        .terbilang { position: absolute; top: 12mm; left: 10mm; font-size: 9pt; max-width: 80mm; white-space: normal; word-wrap: break-word; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .nama-penerima { position: absolute; top: 24mm; left: 5mm; font-weight: bold; white-space: nowrap; max-width: 90mm; overflow-x: auto; }
        .account { position: absolute; top: 31mm; left: 5mm; white-space: nowrap; max-width: 90mm; overflow-x: auto; }
        .alamat { position: absolute; top: 38mm; left: 5mm; max-width: 90mm; white-space: normal; word-wrap: break-word; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .bank-name { position: absolute; top: 52mm; left: 5mm; font-weight: bold; white-space: nowrap; max-width: 90mm; overflow-x: auto; }
        .bank-alamat { position: absolute; top: 59mm; left: 5mm; max-width: 90mm; white-space: normal; word-wrap: break-word; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .swift { position: absolute; top: 73mm; left: 5mm; white-space: nowrap; max-width: 90mm; overflow-x: auto; }
        .negara { position: absolute; top: 80mm; left: 5mm; white-space: nowrap; max-width: 90mm; overflow-x: auto; }
        .berita { position: absolute; top: 90mm; left: 5mm; white-space: nowrap; max-width: 90mm; overflow-x: auto; }
        .tujuan { position: absolute; top: 97mm; left: 5mm; white-space: nowrap; max-width: 90mm; overflow-x: auto; }
        .pengirim { position: absolute; top: 107mm; left: 5mm; font-weight: bold; white-space: nowrap; max-width: 90mm; overflow-x: auto; }
        .deretan-angka { position: absolute; top: 114mm; left: 5mm; letter-spacing: 5px; white-space: nowrap; overflow-x: auto; max-width: 90mm; }
        
        /* KANAN */
        .ref-no-cek { position: absolute; top: 50mm; right: 50mm; text-align: right; }
        .ref-norek-pengirim { position: absolute; top: 50mm; right: 20mm; text-align: right; font-size: 8pt; }
        .ref-total { position: absolute; top: 58mm; right: 5mm; text-align: right; font-size: 11pt; font-weight: bold; color: #000; }
        
        .rincian-biaya { position: absolute; top: 68mm; right: 5mm; text-align: right; font-size: 9pt; }
        .rincian-biaya table { width: auto; min-width: 160px; text-align: right; border-collapse: collapse; margin-left: auto; }
        .rincian-biaya th { border-bottom: 1px solid #000; padding: 2px 4px; font-weight: bold; }
        .rincian-biaya td { padding: 2px 4px; white-space: nowrap; }
        .rincian-biaya .total-row { border-top: 1px dashed #000; font-weight: bold; }
        .rincian-biaya .telex-row td:first-child { text-align: left; }
        
        .keterangan-biaya { position: absolute; top: 118mm; right: 5mm; text-align: right; font-size: 7pt; color: #666; }
        
        @media print { body { background: white; margin: 0; padding: 0; box-shadow: none; } .print-container { box-shadow: none; padding: 0; } @page { size: A4; margin: 0; } }
    </style>
</head>
<body>
    <div id="printContainer"></div>
    <script>
        const params = new URLSearchParams(window.location.search);
        
        const data = {
            currency: params.get('currency') || 'USD',
            jumlah: parseFloat(params.get('jumlah')) || 0,
            terbilang: params.get('terbilang') || '-',
            nama: params.get('nama') || '-',
            account: params.get('account') || '-',
            alamat: params.get('alamat') || '-',
            bankName: params.get('bankName') || '-',
            bankAlamat: params.get('bankAlamat') || '-',
            swift: params.get('swift') || '-',
            country: params.get('country') || '-',
            berita: params.get('berita') || '-',
            tujuan: params.get('tujuan') || '-',
            noLoa: params.get('noLoa') || '-',
            norekPengirim: params.get('norekPengirim') || '',
            pengirim: params.get('pengirim') || '-',
            biayaTelex: parseFloat(params.get('biayaTelex')) || 0,
            metodeTransfer: params.get('metodeTransfer') || 'SHARE',
            biayaFullAmount: parseFloat(params.get('biayaFullAmount')) || 0,
            jenis: params.get('jenis') || 'transfer',
            kurs: parseFloat(params.get('kurs')) || 0,
            jumlahIDR: parseFloat(params.get('jumlahIDR')) || 0
        };
        
        // ========== FUNGSI CEK MATA UANG REKENING ASAL ==========
        function getCurrencyFromRekening(norek) {
            if (!norek) return 'IDR';
            const upper = norek.toUpperCase();
            if (upper.includes('USD')) return 'USD';
            if (upper.includes('EUR')) return 'EUR';
            if (upper.includes('IDR')) return 'IDR';
            return 'IDR';
        }
        
        const mataUangRekeningAsal = getCurrencyFromRekening(data.norekPengirim);
        
        // ========== 3 KONDISI ==========
        const isPembelianValas = data.jenis === 'valas';
        const isTransferValas = (mataUangRekeningAsal === 'IDR' && data.currency !== 'IDR') && !isPembelianValas;
        const isTransferBiasa = !isPembelianValas && !isTransferValas;
        
        // Hitung jumlah akhir
        let jumlahAkhir = data.jumlah;
        let showBiayaFull = false;
        if (data.metodeTransfer === 'FULL_AMOUNT') {
            jumlahAkhir = data.jumlah + data.biayaFullAmount;
            showBiayaFull = true;
        }
        
        // ========== FORMAT ANGKA ==========
        const formatAngka = (angka, curr) => {
            if (curr === 'IDR') {
                return angka.toLocaleString('id-ID', {minimumFractionDigits: 0, maximumFractionDigits: 0});
            } else {
                return angka.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
            }
        };
        
        const formatKurs = (k) => k.toLocaleString('id-ID', {minimumFractionDigits: 0, maximumFractionDigits: 0});
        
        const formattedJumlah = formatAngka(data.jumlah, data.currency);
        const formattedJumlahAkhir = formatAngka(jumlahAkhir, data.currency);
        const formattedBiayaFull = formatAngka(data.biayaFullAmount, data.currency);
        const formattedBiayaTelex = data.biayaTelex.toLocaleString('id-ID', {minimumFractionDigits: 0});
        const formattedKurs = formatKurs(data.kurs);
        const formattedJumlahIDR = formatAngka(data.jumlahIDR, 'IDR');
        
        let formattedBiayaFullIDR = '0';
        let formattedJumlahAkhirIDR = '0';
        if (data.kurs > 0 && showBiayaFull) {
            formattedBiayaFullIDR = formatAngka(data.biayaFullAmount * data.kurs, 'IDR');
        }
        if (isTransferValas && data.kurs > 0) {
            formattedJumlahAkhirIDR = formatAngka(jumlahAkhir * data.kurs, 'IDR');
        }
        
        const norekFormat = data.norekPengirim.split('').join(' ');
        
        // Total untuk ref-total
        let totalDisplay = '';
        if (isPembelianValas) {
            totalDisplay = `IDR ${formattedJumlahIDR}`;
        } else if (isTransferValas) {
            if (data.kurs > 0) {
                totalDisplay = `IDR ${formattedJumlahAkhirIDR}`;
            } else {
                totalDisplay = `${data.currency} ${formattedJumlahAkhir}`;
            }
        } else {
            totalDisplay = `${data.currency} ${formattedJumlahAkhir}`;
        }
        
        // ========== BUILD RINCIAN BIAYA ==========
        let rincianHtml = '';
        let keteranganBiaya = '';
        
        if (isPembelianValas) {
            // KONDISI 1: Pembelian Valas - Hanya 1 baris
            rincianHtml = `
                <table style="margin-left: auto;">
                    <thead><tr><th>Valuta Asing</th><th>Kurs</th><th>Nilai Ekuivalen</th></tr></thead>
                    <tbody>
                        <tr><td class="currency-col">${data.currency} ${formattedJumlah}</td>
                            <td class="kurs-col">${formattedKurs}</td>
                            <td class="jumlah-col">IDR ${formattedJumlahIDR}</td>
                        </tr>
                    </tbody>
                </table>
            `;
            keteranganBiaya = `Pembelian valas | 1 ${data.currency} = IDR ${formattedKurs}`;
            
        } else if (isTransferValas) {
            // KONDISI 2: Transfer Valas IDR → USD/EUR
            let rows = '';
            
            // Baris 1: Jumlah Transfer
            if (data.kurs > 0 && data.jumlahIDR !== 0) {
                rows += `<tr><td class="currency-col">${data.currency} ${formattedJumlah}</td><td class="kurs-col">${formattedKurs}</td><td class="jumlah-col">IDR ${formattedJumlahIDR}</td></tr>`;
            } else {
                rows += `<tr><td class="currency-col">${data.currency} ${formattedJumlah}</td><td class="kurs-col">-</td><td class="jumlah-col">${data.currency} ${formattedJumlah}</td></tr>`;
            }
            
            // Baris 2: Full Amount
            if (showBiayaFull) {
                if (data.kurs > 0 && data.biayaFullAmount > 0) {
                    rows += `<tr><td class="currency-col">${data.currency} ${formattedBiayaFull}</td><td class="kurs-col">${formattedKurs}</td><td class="jumlah-col">IDR ${formattedBiayaFullIDR}</td></tr>`;
                } else {
                    rows += `<tr><td class="currency-col">${data.currency} ${formattedBiayaFull}</td><td class="kurs-col">-</td><td class="jumlah-col">${data.currency} ${formattedBiayaFull}</td></tr>`;
                }
            }
            
            // Baris 3: Biaya Telex
            if (data.biayaTelex > 0) {
                rows += `<tr class="telex-row"><td class="currency-col">Biaya Telex</td><td class="kurs-col">-</td><td class="jumlah-col">IDR ${formattedBiayaTelex}</td></tr>`;
            }
            
            // Total
            let totalValue = '';
            if (data.kurs > 0 && formattedJumlahAkhirIDR !== '0') {
                totalValue = `IDR ${formattedJumlahAkhirIDR}`;
            } else {
                totalValue = `${data.currency} ${formattedJumlahAkhir}`;
            }
            rows += `<tr class="total-row"><td class="currency-col"><strong>Total</strong></td><td class="kurs-col">-</td><td class="jumlah-col"><strong>${totalValue}</strong></td></tr>`;
            
            rincianHtml = `<table style="margin-left: auto;"><thead><tr><th>Valuta Asing</th><th>Kurs</th><th>Nilai Ekuivalen</th></tr></thead><tbody>${rows}</tbody></table>`;
            keteranganBiaya = `Transfer valas IDR → ${data.currency}`;
            if (data.kurs > 0) keteranganBiaya += ` | 1 ${data.currency} = IDR ${formattedKurs}`;
            if (showBiayaFull) keteranganBiaya += ` | Full amount include`;
            if (data.biayaTelex > 0) keteranganBiaya += ` | Biaya telex IDR ${formattedBiayaTelex}`;
            
        } else {
            // KONDISI 3: Transfer Biasa USD→USD, EUR→EUR
            let rows = `<tr><td class="currency-col">${data.currency} ${formattedJumlah}</td><td class="kurs-col">-</td><td class="jumlah-col">${data.currency} ${formattedJumlah}</td></tr>`;
            
            if (showBiayaFull) {
                rows += `<tr><td class="currency-col">${data.currency} ${formattedBiayaFull}</td><td class="kurs-col">-</td><td class="jumlah-col">${data.currency} ${formattedBiayaFull}</td></tr>`;
            }
            
            if (data.biayaTelex > 0 && mataUangRekeningAsal === 'IDR') {
                rows += `<tr class="telex-row"><td class="currency-col">Biaya Telex</td><td class="kurs-col">-</td><td class="jumlah-col">IDR ${formattedBiayaTelex}</td></tr>`;
            }
            
            if (showBiayaFull) {
                rows += `<tr class="total-row"><td class="currency-col"><strong>Total</strong></td><td class="kurs-col">-</td><td class="jumlah-col"><strong>${data.currency} ${formattedJumlahAkhir}</strong></td></tr>`;
            }
            
            rincianHtml = `<table style="margin-left: auto;"><thead><tr><th>Valuta Asing</th><th>Kurs</th><th>Nilai Ekuivalen</th></tr></thead><tbody>${rows}</tbody></table>`;
            keteranganBiaya = `Transfer ${mataUangRekeningAsal} → ${data.currency}`;
            if (showBiayaFull) keteranganBiaya += ` | Full amount include`;
            if (data.biayaTelex > 0 && mataUangRekeningAsal === 'IDR') keteranganBiaya += ` | Biaya telex IDR ${formattedBiayaTelex} (terpisah)`;
        }
        
        const html = `
            <div class="print-container">
                <!-- KIRI -->
                <div class="currency">${data.currency}</div>
                <div class="jumlah-angka">${formattedJumlah}</div>
                <div class="terbilang">${data.terbilang}</div>
                
                <div class="nama-penerima">${data.nama}</div>
                <div class="account">${data.account}</div>
                <div class="alamat">${data.alamat}</div>
                
                <div class="bank-name">${data.bankName}</div>
                <div class="bank-alamat">${data.bankAlamat}</div>
                <div class="swift">${data.swift}</div>
                <div class="negara">${data.country}</div>
                
                <div class="berita">${data.berita}</div>
                <div class="tujuan">${data.tujuan}</div>
                
                <div class="pengirim">${data.pengirim}</div>
                <div class="deretan-angka">${norekFormat}</div>
                
                <!-- KANAN -->
                <div class="ref-no-cek">${data.noLoa}</div>
                <div class="ref-norek-pengirim">${data.norekPengirim}</div>
                <div class="ref-total">Total: ${totalDisplay}</div>
                
                <div class="rincian-biaya">${rincianHtml}</div>
                <div class="keterangan-biaya">${keteranganBiaya}</div>
            </div>
        `;
        
        document.getElementById('printContainer').innerHTML = html;
    </script>
</body>
</html>
