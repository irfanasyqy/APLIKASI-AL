<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cetak Tanda Terima - APLIKASI AL</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        @page {
            size: A4;
            margin: 0mm;
        }
        
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: white;
        }
        
        body {
            font-family: 'Times New Roman', Times, serif;
            padding: 0;
            margin: 0;
        }
        
        .print-container {
            max-width: 210mm;
            margin: 0 auto;
            background: white;
            padding: 2mm;
            border-radius: 0;
            box-shadow: none;
        }
        
        .copy-wrapper {
            display: flex;
            flex-direction: column;
            height: 297mm !important;
            page-break-after: avoid;
            page-break-inside: avoid;
            position: relative;
        }
        
        .copy-item {
            height: 50%;
            padding: 4mm 6mm;
            border: 1px solid #ddd;
            border-radius: 0;
            position: relative;
            display: flex;
            flex-direction: column;
            page-break-inside: avoid;
        }
        
        .copy-item:first-child {
            border-bottom: none;
            margin-bottom: 0;
        }
        
        .company-header {
            text-align: center;
            border-bottom: 2px solid #000;
            padding-bottom: 3px;
            margin-bottom: 3px;
        }
        
        .company-header h1 {
            font-size: 13pt;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        
        .company-header .address {
            font-size: 10pt;
            line-height: 1.2;
            margin-top: 1px;
            color: #333;
        }
        
        .title-section {
            text-align: center;
            margin: 1px 0 2px 0;
        }
        
        .title-section h2 {
            font-size: 14pt;
            font-weight: bold;
            text-decoration: underline;
            letter-spacing: 2px;
        }
        
        .info-section {
            margin: 1px 0 0px 0;
        }
        
        .info-row {
            display: flex;
            margin-bottom: -1px;
            font-size: 10.5pt;
            line-height: 1.2;
        }
        
        .info-label {
            width: 70px;
            font-weight: bold;
            flex-shrink: 0;
        }
        
        .info-value {
            flex: 1;
            font-size: 10.5pt;
        }
        
        .invoice-section {
            margin: 1px 0 2px 0;
            flex: 1;
        }
        
        .invoice-row {
            display: flex;
            font-size: 10.5pt;
            line-height: 1.3;
            margin-bottom: 0px;
        }
        
        .invoice-label {
            width: 100px;
            font-weight: bold;
            flex-shrink: 0;
        }
        
        .invoice-colon {
            width: 12px;
            flex-shrink: 0;
            text-align: center;
        }
        
        .invoice-value {
            flex: 1;
        }
        
        .signature-section {
            margin-top: 3px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding-top: 2px;
            border-top: 1px solid #eee;
            flex-shrink: 0;
        }
        
        .signature-left {
            text-align: center;
            display: inline-flex;
            flex-direction: column;
            align-items: center; 
        }
        
        .signature-left .signature-line {
            width: 100%;
            border-top: 1px solid #000;
            margin-top: 80px;
        }
        
        .signature-left .signature-label {
            font-size: 10pt;
            margin-top: 2px;
        }
        
        .signature-right {
            text-align: center;
            display: inline-flex;
            flex-direction: column;
            align-items: center;
        }
        
        .signature-right .city-date {
            font-size: 10.5pt;
            margin-bottom: 15px;
            white-space: nowrap;
            font-family: 'Times New Roman', Times, serif;
            letter-spacing: 0.5px;
        }
        
        .signature-right .receiver-label {
            font-size: 10.5pt;
            margin-bottom: 80px;
        }
        
        .signature-right .signature-line {
            width: 100%;
            border-top: 1px solid #000;
            margin: 3px auto 0;
        }
        
        .signature-right .signature-name {
            font-size: 10.5pt;
            margin-top: 2px;
        }
        
        .signature-left > div:first-child {
            font-size: 10.5pt;
        }
        
        .cut-line {
            position: absolute;
            top: 148.5mm;
            left: 0;
            right: 0;
            border-top: 2px dashed #999;
            height: 0;
            margin: 0;
            padding: 0;
            z-index: 10;
            page-break-after: avoid;
            page-break-inside: avoid;
            pointer-events: none;
        }
        
        .no-print {
            margin-bottom: 10px;
            text-align: center;
        }
        
        .btn-print {
            background: #27ae60;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .btn-print:hover {
            background: #219a52;
        }
        
        .btn-close {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            margin-left: 10px;
        }
        
        .btn-close:hover {
            background: #c0392b;
        }
        
        .error-message {
            text-align: center;
            padding: 50px;
            color: red;
            font-size: 11pt;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: #666;
            font-size: 11pt;
        }
        
        @media print {
            html, body {
                margin: 0 !important;
                padding: 0 !important;
                height: 100% !important;
                background: white !important;
            }
            
            body {
                padding: 0 !important;
                margin: 0 !important;
            }
            
            .print-container {
                box-shadow: none !important;
                padding: 0mm !important;
                border-radius: 0 !important;
                max-width: 100% !important;
                margin: 0 !important;
            }
            
            .no-print {
                display: none !important;
            }
            
            .copy-wrapper {
                height: 297mm !important;
                position: relative !important;
                page-break-after: avoid !important;
                page-break-inside: avoid !important;
                margin: 0 !important;
                padding: 0 !important;
            }
            
            .copy-item {
                border: none !important;
                padding: 3mm 5mm !important;
                height: 50% !important;
                page-break-inside: avoid !important;
                page-break-after: avoid !important;
                margin: 0 !important;
            }
            
            .copy-item:first-child {
                border-bottom: none !important;
                margin-bottom: 0 !important;
            }
            
            .cut-line {
                top: 148.5mm !important;
                border-top: 2px dashed #999 !important;
                height: 0 !important;
                margin: 0 !important;
                padding: 0 !important;
                page-break-after: avoid !important;
                page-break-inside: avoid !important;
            }
            
            .company-header {
                border-bottom-color: #000 !important;
            }
            
            .signature-line {
                border-top-color: #000 !important;
            }
            
            .signature-section {
                border-top-color: #eee !important;
            }
            
            .signature-right .city-date {
                font-size: 10.5pt !important;
                white-space: nowrap !important;
            }
        }
    </style>
</head>
<body>
<div class="print-container">
    <!-- BUTTON CETAK -->
    <div class="no-print">
        <button class="btn-print" onclick="window.print()">🖨️ CETAK</button>
        <button class="btn-close" onclick="window.close()">✖ TUTUP</button>
        <span style="margin-left:15px; font-size:11pt; color:#666;">📄 2 Copy A5 dalam 1 lembar A4</span>
    </div>
    
    <div id="content">
        <div class="loading">📡 Memuat data...</div>
    </div>
</div>

<script src="../config.js"></script>
<script>
    const API_URL = CONFIG.API_URL;
    const urlParams = new URLSearchParams(window.location.search);
    const noTT = urlParams.get('noTT') || urlParams.get('noTF');
    
    const COMPANY_DATA = {
        name: 'PT. SINAR CAHAYA CEMERLANG',
        address: 'JL GUNUNG SAHARI II NO. 7 RT 12/07 GUNUNG SAHARI SELATAN, KEMAYORAN, KOTA ADM. JAKARTA PUSAT, DKI JAKARTA, 10610'
    };
    
    function formatRupiah(angka) {
        if (angka === undefined || angka === null || isNaN(angka)) return 'Rp 0';
        return new Intl.NumberFormat('id-ID', {
            style: 'currency',
            currency: 'IDR',
            minimumFractionDigits: 0,
            maximumFractionDigits: 2
        }).format(angka);
    }
    
    function formatDate(dateStr) {
        if (!dateStr) return getDefaultDate();
        try {
            let date = new Date(dateStr);
            if (isNaN(date.getTime())) return getDefaultDate();
            const months = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 
                           'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
            return 'Jakarta, ' + date.getDate() + ' ' + months[date.getMonth()] + ' ' + date.getFullYear();
        } catch (e) {
            return getDefaultDate();
        }
    }
    
    function getDefaultDate() {
        const now = new Date();
        const months = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 
                       'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
        return 'Jakarta, ' + now.getDate() + ' ' + months[now.getMonth()] + ' ' + now.getFullYear();
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    async function loadData() {
        if (!noTT) {
            document.getElementById('content').innerHTML = `
                <div class="error-message">
                    ❌ Tidak ada nomor Tanda Terima<br>
                    <small>Parameter noTT atau noTF tidak ditemukan</small>
                </div>
            `;
            return;
        }
        
        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ type: 'getTandaTerima' })
            });
            const result = await response.json();
            
            if (result.success && result.data) {
                const tt = result.data.find(item => item.noTT === noTT);
                if (!tt) {
                    document.getElementById('content').innerHTML = `
                        <div class="error-message">
                            ❌ Data tidak ditemukan untuk No. TT: ${escapeHtml(noTT)}
                        </div>
                    `;
                    return;
                }
                displayPrintContent(tt);
            } else {
                document.getElementById('content').innerHTML = `
                    <div class="error-message">❌ Gagal memuat data: ${result.error || 'Unknown error'}</div>
                `;
            }
        } catch (error) {
            document.getElementById('content').innerHTML = `
                <div class="error-message">❌ Error koneksi: ${error.message}</div>
            `;
        }
    }
    
    function createCopy(tt, ptName, ptAddress, invoices, formattedDate) {
        const maxInvoices = invoices.slice(0, 5);
        let invoiceRows = '';
        
        if (maxInvoices.length > 0) {
            invoiceRows += `
                <div class="invoice-row">
                    <div class="invoice-label">Telah diterima</div>
                    <div class="invoice-colon">:</div>
                    <div class="invoice-value">1. ${escapeHtml(maxInvoices[0].no)}${maxInvoices[0].nominal ? ' SENILAI ' + formatRupiah(maxInvoices[0].nominal) : ''}</div>
                </div>
            `;
            for (let i = 1; i < maxInvoices.length; i++) {
                invoiceRows += `
                    <div class="invoice-row">
                        <div class="invoice-label"></div>
                        <div class="invoice-colon">:</div>
                        <div class="invoice-value">${i + 1}. ${escapeHtml(maxInvoices[i].no)}${maxInvoices[i].nominal ? ' SENILAI ' + formatRupiah(maxInvoices[i].nominal) : ''}</div>
                    </div>
                `;
            }
        } else {
            invoiceRows = `
                <div class="invoice-row">
                    <div class="invoice-label">Telah diterima</div>
                    <div class="invoice-colon"></div>
                    <div class="invoice-value">- Tidak ada faktur -</div>
                </div>
            `;
        }
        
        const customerNama = tt.customerNama || '-';
        const pic = tt.customerPic || tt.pic || '-';
        const hp = tt.customerHP || tt.customerTelepon || tt.hp || '-';
        const customerAlamat = tt.customerAlamat || '-';
        
        return `
            <div class="copy-item">
                <div class="company-header">
                    <h1>${escapeHtml(ptName)}</h1>
                    <div class="address">${escapeHtml(ptAddress)}</div>
                </div>
                <div class="title-section">
                    <h2>TANDA TERIMA</h2>
                </div>
                <div class="info-section">
                    <div class="info-row">
                        <span class="info-label">Kepada</span>
                        <span class="info-value">: <span class="highlight">${escapeHtml(customerNama)}</span></span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Up</span>
                        <span class="info-value">: ${escapeHtml(pic)}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Hp</span>
                        <span class="info-value">: ${escapeHtml(hp)}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Alamat</span>
                        <span class="info-value">: ${escapeHtml(customerAlamat)}</span>
                    </div>
                </div>
                <div class="invoice-section">
                    ${invoiceRows}
                </div>
                <div class="signature-section">
                    <div class="signature-left">
                        <div>Hormat Kami,</div>
                        <div class="signature-line"></div>
                        <div class="signature-label">( PT SINAR CAHAYA CEMERLANG )</div>
                    </div>
                    <div class="signature-right">
                        <div class="city-date">${formattedDate}</div>
                        <div class="receiver-label">Yang menerima,</div>
                        <div class="signature-line"></div>
                        <div class="signature-name">( ${escapeHtml(customerNama || 'Customer')} )</div>
                    </div>
                </div>
            </div>
        `;
    }
    
    function displayPrintContent(tt) {
        let invoices = [];
        if (tt.invoices && tt.invoices.length > 0) {
            invoices = tt.invoices.slice(0, 5);
        } else {
            for (let i = 1; i <= 5; i++) {
                const invNo = tt[`invoice${i}`];
                if (invNo && invNo !== '') {
                    invoices.push({ no: invNo, nominal: 0 });
                }
            }
        }
        
        let ptName = tt.ptName || tt.ptCode || tt.companyName || tt.perusahaan || COMPANY_DATA.name;
        let ptAddress = tt.ptAddress || tt.companyAddress || tt.alamatPerusahaan || COMPANY_DATA.address;
        if (ptName && ptName.length < 10 && ptName.toUpperCase() === ptName) {
            ptName = COMPANY_DATA.name;
            ptAddress = COMPANY_DATA.address;
        }
        
        let tanggal = tt.tanggal || tt.tgl || tt.date || tt.createdAt || tt.updatedAt;
        const formattedDate = formatDate(tanggal);
        
        const copy1 = createCopy(tt, ptName, ptAddress, invoices, formattedDate);
        const copy2 = createCopy(tt, ptName, ptAddress, invoices, formattedDate);
        
        document.getElementById('content').innerHTML = `
            <div class="copy-wrapper">
                ${copy1}
                <div class="cut-line"></div>
                ${copy2}
            </div>
        `;
    }
    
    loadData();
</script>
</body>
</html>
