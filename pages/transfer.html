<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APLIKASI AL - Transfer Bank</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="container">
    <div class="app-header">
        <div class="app-title">APLIKASI <span>AL</span></div>
        <p class="subtitle">Transfer Bank</p>
    </div>

    <button class="btn-back" onclick="window.location.href='../index.html'">← KEMBALI KE MENU</button>
    
    <div class="card">
        <h2>🏦 FORM TRANSFER BANK</h2>
        <!-- Supplier Selection dengan Search Box -->
<div class="form-group">
    <label>Pilih Supplier</label>
    <div style="display: flex; gap: 10px; align-items: center;">
        <select id="supplierSelect" style="flex: 1;">
            <option value="">-- Pilih Supplier --</option>
        </select>
        <button type="button" id="btnAddSupplier" class="btn-add-supplier" title="Tambah Supplier Baru">➕</button>
    </div>
    <input type="text" id="searchSupplier" placeholder="🔍 Cari supplier (nama, account, bank)..." style="margin-top: 8px;">
    <div id="supplierSearchResult" style="font-size: 0.7rem; color: #666; margin-top: 4px;"></div>
</div>

<!-- MODAL TAMBAH SUPPLIER -->
<div id="supplierModal" class="modal" style="display: none;">
    <div class="modal-content">
        <div class="modal-header">
            <h3>➕ Tambah Supplier Baru</h3>
            <span class="modal-close">&times;</span>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label>Nama Supplier *</label>
                <input type="text" id="modalNama" placeholder="Nama supplier" required>
            </div>
            <div class="form-group">
                <label>Account Number</label>
                <input type="text" id="modalAccount" placeholder="Nomor rekening">
            </div>
            <div class="form-group">
                <label>Currency *</label>
                <select id="modalCurrency">
                    <option value="USD">USD</option>
                    <option value="EUR">EUR</option>
                    <option value="JPY">JPY</option>
                    <option value="GBP">GBP</option>
                    <option value="SGD">SGD</option>
                </select>
            </div>
            <div class="form-group">
                <label>Alamat</label>
                <textarea id="modalAlamat" rows="2" placeholder="Alamat lengkap supplier"></textarea>
            </div>
            <div class="form-group">
                <label>Bank Name</label>
                <input type="text" id="modalBankName" placeholder="Nama bank">
            </div>
            <div class="form-group">
                <label>Bank Alamat</label>
                <input type="text" id="modalBankAlamat" placeholder="Alamat bank">
            </div>
            <div class="form-group">
                <label>SWIFT Code</label>
                <input type="text" id="modalSwift" placeholder="SWIFT code">
            </div>
            <div class="form-group">
                <label>Country</label>
                <input type="text" id="modalCountry" placeholder="Negara">
            </div>
        </div>
        <div class="modal-footer">
            <button id="modalSaveBtn" class="btn-success">💾 Simpan Supplier</button>
            <button id="modalCancelBtn" class="btn-secondary">Batal</button>
        </div>
    </div>
</div>
        <div id="supplierInfo" class="supplier-info" style="display:none;"></div>
        <div class="bank-option">
            <div class="bank-card" data-bank="PANIN">🏦 BANK PANIN</div>
            <div class="bank-card" data-bank="BCA">🏦 BANK BCA</div>
        </div>
        <input type="hidden" id="selectedBank" value="PANIN">
        <div class="row">
            <div class="form-group"><label>Jumlah</label><input type="number" id="jumlahTransfer" step="100"></div>
            <div class="form-group"><label>Currency</label><input type="text" id="currencyDisplay" readonly></div>
        </div>
        <div class="form-group"><label>Berita Transfer</label><textarea id="beritaTransfer" rows="2"></textarea></div>
        <div class="form-group"><label>Tujuan Transfer</label><textarea id="tujuanTransfer" rows="1"></textarea></div>
        <div class="form-group"><label>No CEK/LOA</label><input type="text" id="noCekLoa"></div>
        <button id="btnPrintTransfer" class="btn-success">🖨️ SUBMIT & PRINT</button>
    </div>

    <!-- PRINT AREAS -->
    <div class="print-area" id="printAreaPanin"><div id="paninPrintContent"></div></div>
    <div class="print-area" id="printAreaBca"><div id="bcaPrintContent"></div></div>
    <div class="print-area" id="printAreaTT"><div id="ttPrintContent"></div></div>
    <div class="print-area" id="printAreaLabel"><div id="labelPrintContent"></div></div>
</div>
<script src="../config.js"></script>
<script src="../js/data.js"></script>
<script src="../js/ui.js"></script>
<script src="../js/transfer.js"></script>
<script src="../js/tanda-terima.js"></script>
<script src="../js/cetak-label.js"></script>
<script src="../js/edit-data.js"></script>
<script src="../js/riwayat.js"></script>
<script src="../js/tukar-faktur.js"></script>
<script src="../js/main.js"></script>
</body>
</html>
