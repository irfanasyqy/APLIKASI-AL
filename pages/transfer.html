<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>APLIKASI AL - Transfer Bank</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="container">
    <div class="app-header">
        <div class="app-title">APLIKASI <span>AL</span></div>
        <p class="subtitle">Transfer Bank & Valas</p>
    </div>

    <button class="btn-back" onclick="window.location.href='../index.html'">← KEMBALI KE MENU</button>
    
    <div class="card">
        <h2>🏦 TRANSFER</h2>
        
        <!-- TABS -->
        <div class="transfer-tabs">
            <button id="tabSupplier" class="transfer-tab active">🏭 Transfer ke Supplier</button>
            <button id="tabValas" class="transfer-tab">💱 Pembelian Valas</button>
        </div>
        
        <!-- ========== FORM TRANSFER KE SUPPLIER ========== -->
        <div id="formSupplier" class="transfer-form">
            <div class="form-group">
                <label>Pilih Supplier</label>
                <select id="supplierSelect" style="width: 100%; padding: 12px 14px; border-radius: 18px;">
                    <option value="">-- Pilih Supplier --</option>
                </select>
                <input type="text" id="searchSupplier" placeholder="🔍 Cari supplier (nama, account, bank)..." style="margin-top: 8px; width: 100%; padding: 10px 12px; border-radius: 18px;">
                <div id="supplierSearchResult" style="font-size: 0.7rem; color: #666; margin-top: 4px;"></div>
            </div>
            
            <!-- Rekening Asal -->
            <div class="form-group">
                <label>Rekening Asal (Perusahaan)</label>
                <select id="rekeningAsalTransfer">
                    <option value="">-- Pilih Rekening Asal --</option>
                </select>
            </div>

            <div id="supplierInfo" class="supplier-info" style="display:none;"></div>
            
            <div class="bank-option">
                <div class="bank-card" data-bank="PANIN">🏦 BANK PANIN</div>
                <div class="bank-card" data-bank="BCA">🏦 BANK BCA</div>
            </div>
            <input type="hidden" id="selectedBank" value="PANIN">
            
            <div class="row">
                <div class="form-group"><label>Jumlah</label><input type="number" id="jumlahTransfer" step="100"></div>
                <div class="form-group"><label>Currency</label><input type="text" id="currencyDisplay" readonly></div>
            </div>
            
            <div class="form-group"><label>Berita Transfer</label><textarea id="beritaTransfer" rows="2"></textarea></div>
            <div class="form-group"><label>Tujuan Transfer</label><textarea id="tujuanTransfer" rows="1"></textarea></div>
            <div class="form-group"><label>No CEK/LOA</label><input type="text" id="noCekLoa"></div>
            
            <!-- VALUE DATE & BIAYA TELEX -->
            <div class="row">
                <div class="form-group">
                    <label>Value Date</label>
                    <select id="valueDateType">
                        <option value="TODAY">TODAY (Hari ini) - Biaya Rp 50.000</option>
                        <option value="SPOT">SPOT (2 hari kerja) - Biaya Rp 35.000</option>
                        <option value="TOM">TOM (Besok) - Biaya Rp 35.000</option>
                    </select>
                    <small style="font-size: 0.7rem; color: #666;">Biaya Telex: <span id="biayaTelexDisplay">Rp 50.000</span></small>
                </div>
                <div class="form-group">
                    <label>Metode Transfer</label>
                    <select id="metodeTransfer">
                        <option value="SHARE">SHARE (Biaya dibagi)</option>
                        <option value="FULL_AMOUNT">FULL AMOUNT (Biaya ditanggung pengirim)</option>
                    </select>
                </div>
            </div>
            <input type="hidden" id="biayaTelex" value="50000">
            
            <!-- Detail Full Amount -->
            <div id="fullAmountDetail" style="display: none;">
                <div class="form-group">
                    <label>Biaya Full Amount</label>
                    <div id="fullAmountInfo" style="background: #f0f0f0; padding: 10px; border-radius: 12px;">
                        <p id="fullAmountText">Pilih metode FULL AMOUNT untuk melihat biaya</p>
                    </div>
                    <input type="hidden" id="fullAmountBiaya" value="0">
                </div>
            </div>
            
            <button id="btnPrintTransfer" class="btn-success">🖨️ SUBMIT & PRINT</button>
        </div>
        
        <!-- ========== FORM PEMBELIAN VALAS ========== -->
        <div id="formValas" class="transfer-form" style="display: none;">
            <div class="row">
                <div class="form-group">
                    <label>Dari Rekening (Sumber)</label>
                    <select id="dariRekening">
                        <option value="">-- Pilih Rekening Asal --</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Ke Rekening (Tujuan)</label>
                    <select id="keRekening">
                        <option value="">-- Pilih Rekening Tujuan --</option>
                    </select>
                </div>
            </div>
            
            <div class="row">
                <div class="form-group">
                    <label>Jumlah (IDR)</label>
                    <input type="number" id="jumlahIDR" step="1000" placeholder="Jumlah dalam Rupiah">
                </div>
                <div class="form-group">
                    <label>Kurs</label>
                    <input type="number" id="kursValas" step="10" placeholder="Kurs (1 USD/EUR = ? IDR)">
                </div>
            </div>
            
            <div class="form-group">
                <label>Jumlah Dapat</label>
                <input type="text" id="jumlahDapat" readonly style="background:#f0f0f0; font-weight: bold; color: #27ae60;">
            </div>
            
            <div class="form-group">
                <label>Berita / Keterangan</label>
                <textarea id="beritaValas" rows="2" placeholder="Berita transfer..."></textarea>
            </div>
            
            <div class="form-group">
                <label>Tujuan Transfer</label>
                <textarea id="tujuanValas" rows="1" placeholder="Tujuan transfer (opsional)..."></textarea>
            </div>
            
            <div class="form-group">
                <label>Informasi Tambahan (Opsional)</label>
                <textarea id="infoTambahanValas" rows="2" placeholder="Informasi tambahan..."></textarea>
            </div>
            
            <div class="form-group">
                <label>No Referensi</label>
                <input type="text" id="noRefValas" placeholder="No referensi internal (opsional)">
            </div>
            
            <button id="btnPrintValas" class="btn-success">🖨️ PRINT BUKTI VALAS</button>
        </div>
    </div>

    <!-- PRINT AREAS -->
    <div class="print-area" id="printAreaPanin"><div id="paninPrintContent"></div></div>
    <div class="print-area" id="printAreaBca"><div id="bcaPrintContent"></div></div>
    <div class="print-area" id="printAreaTT"><div id="ttPrintContent"></div></div>
    <div class="print-area" id="printAreaLabel"><div id="labelPrintContent"></div></div>
</div>

<script src="../config.js"></script>
<script src="../js/data.js"></script>
<script src="../js/ui.js"></script>
<script src="../js/transfer.js"></script>
<script src="../js/tanda-terima.js"></script>
<script src="../js/cetak-label.js"></script>
<script src="../js/edit-data.js"></script>
<script src="../js/riwayat.js"></script>
<script src="../js/tukar-faktur.js"></script>
<script src="../js/main.js"></script>
</body>
</html>
