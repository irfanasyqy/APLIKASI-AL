<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Tanda Terima - APLIKASI AL</title>
    
    <!-- Import CSS yang sudah ada -->
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/menu.css">
    <link rel="stylesheet" href="../css/card.css">
    <link rel="stylesheet" href="../css/form.css">
    <link rel="stylesheet" href="../css/table.css">
    <link rel="stylesheet" href="../css/print.css">
    
    <!-- jsPDF untuk konversi gambar ke PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        /* Layout 2 kolom */
        .two-columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }
        
        /* Panel daftar TT */
        .list-panel {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
            max-height: 550px;
            overflow-y: auto;
        }
        
        .list-item {
            padding: 12px;
            margin: 8px 0;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 4px solid #27ae60;
        }
        
        .list-item:hover {
            background: #e8f4fd;
            transform: translateX(3px);
        }
        
        .list-item.active {
            background: #d4edda;
            border-left-color: #2c3e50;
        }
        
        .list-item.belum-bukti {
            border-left-color: #e74c3c;
            background: #fff5f5;
        }
        
        .list-item .no-tt {
            font-weight: bold;
            font-size: 14px;
        }
        
        .list-item .customer-name {
            font-size: 12px;
            color: #666;
            margin-top: 4px;
        }
        
        .list-item .total {
            font-size: 12px;
            color: #27ae60;
            margin-top: 4px;
        }
        
        .status-badge {
            font-size: 10px;
            margin-top: 5px;
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
        }
        .badge-success {
            background: #d4edda;
            color: #155724;
        }
        .badge-warning {
            background: #fff3cd;
            color: #856404;
        }
        
        /* Panel detail */
        .detail-panel {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
        }
        
        .detail-row {
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .detail-label {
            font-weight: bold;
            color: #2c3e50;
            min-width: 100px;
            display: inline-block;
        }
        
        .invoice-list {
            list-style: none;
            padding-left: 0;
            margin-top: 10px;
        }
        
        .invoice-list li {
            padding: 5px 0;
            font-family: monospace;
            border-bottom: 1px dashed #ddd;
        }
        
        .status-bukti-tersedia {
            color: #27ae60;
            font-weight: bold;
        }
        
        .status-bukti-belum {
            color: #e74c3c;
            font-weight: bold;
        }
        
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        
        .btn-print {
            background: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            flex: 1;
        }
        .btn-print:hover { background: #2980b9; }
        
        .btn-upload {
            background: #f39c12;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            flex: 1;
        }
        .btn-upload:hover { background: #e67e22; }
        
        .btn-buka-bukti {
            background: #9b59b6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            flex: 1;
        }
        .btn-buka-bukti:hover { background: #8e44ad; }
        
        .btn-hapus-bukti {
            background: #e67e22;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            flex: 1;
            display: none;
        }
        .btn-hapus-bukti:hover { background: #d35400; }
        
        .btn-hapus {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            flex: 1;
        }
        .btn-hapus:hover { background: #c0392b; }
        
        .btn-refresh {
            background: #2c3e50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 15px;
        }
        
        .filter-section {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .filter-section input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        
        .total-data {
            font-size: 12px;
            color: #666;
            margin-top: 10px;
            text-align: center;
        }
        
        /* Modal Upload */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .modal-content {
            background: white;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            overflow: hidden;
            animation: slideUp 0.3s ease;
        }
        
        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        .modal-header {
            padding: 15px 20px;
            background: #2c3e50;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .modal-header .modal-close {
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            line-height: 1;
        }
        
        .modal-header .modal-close:hover {
            color: #e74c3c;
        }
        
        .modal-body {
            padding: 20px;
        }
        
        .upload-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 15px;
        }
        
        .upload-option {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .upload-option .icon {
            font-size: 24px;
        }
        
        .upload-option.drive {
            background: #4285f4;
            color: white;
        }
        
        .upload-option.pc {
            background: #27ae60;
            color: white;
        }
        
        .upload-option.camera {
            background: #e67e22;
            color: white;
        }
        
        .upload-option:hover {
            transform: scale(1.02);
            filter: brightness(0.95);
        }
        
        /* Loading spinner */
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .progress-bar {
            width: 100%;
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            overflow: hidden;
            margin-top: 10px;
            display: none;
        }
        
        .progress-fill {
            width: 0%;
            height: 100%;
            background: #27ae60;
            transition: width 0.3s;
        }
        
        @media (max-width: 768px) {
            .two-columns {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="app-header">
        <div class="app-title">APLIKASI <span>AL</span></div>
        <p class="subtitle">Tanda Terima - Riwayat & Kelola</p>
    </div>

    <button class="btn-back" onclick="window.location.href='../index.html'">← KEMBALI KE MENU</button>
    
    <div class="card">
        <h2>📋 TANDA TERIMA</h2>
        
        <div class="filter-section">
            <input type="text" id="searchFilter" placeholder="🔍 Cari No. TT atau Nama Customer...">
            <button id="btnRefresh" class="btn-refresh">🔄 REFRESH</button>
        </div>
        
        <div class="two-columns">
            <!-- KOLOM KIRI: Daftar Tanda Terima -->
            <div class="list-panel">
                <h3>📄 Daftar Tanda Terima</h3>
                <div id="ttList">
                    <div style="text-align: center; padding: 20px;">Memuat data...</div>
                </div>
                <div class="total-data" id="totalData"></div>
            </div>
            
            <!-- KOLOM KANAN: Detail Tanda Terima -->
            <div class="detail-panel" id="detailPanel">
                <h3>📋 Detail Tanda Terima</h3>
                <div id="detailContent">
                    <div style="text-align: center; padding: 20px; color: #999;">Pilih tanda terima dari daftar</div>
                </div>
                
                <div class="btn-group" id="actionButtons" style="display: none;">
                    <button class="btn-print" id="btnPrint">🖨️ PRINT</button>
                    <button class="btn-upload" id="btnUpload">📎 UPLOAD BUKTI</button>
                    <button class="btn-buka-bukti" id="btnBukaBukti">📂 BUKA BUKTI</button>
                    <button class="btn-hapus-bukti" id="btnHapusBukti">🗑️ HAPUS BUKTI</button>
                    <button class="btn-hapus" id="btnHapus">🗑️ HAPUS DATA</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- MODAL UPLOAD BUKTI (VERSI HTML YANG SUDAH BERHASIL) -->
<div id="uploadModal" class="modal" style="display: none;">
    <div class="modal-content">
        <div class="modal-header">
            <h3>📎 Upload Bukti Tanda Terima</h3>
            <span class="modal-close">&times;</span>
        </div>
        <div class="modal-body">
            <div class="folder-info" style="background: #e8f0fe; padding: 10px; border-radius: 4px; margin-bottom: 20px; color: #1a73e8;">
                📂 Upload ke folder: <b>BUKTI TUKAR FAKTUR DAN RESI</b>
            </div>
            
            <div id="fileNameInputGroup" style="margin-bottom: 15px;">
                <label style="display: block; margin-bottom: 5px; font-weight: bold;">📝 Nama File (opsional):</label>
                <input type="text" id="fileName" placeholder="Kosongkan untuk otomatis" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd;">
                <small style="color: #666;">*Biarkan kosong untuk menggunakan nomor TT</small>
            </div>
            
            <div class="form-group" style="margin-bottom: 15px;">
                <label style="display: block; margin-bottom: 5px; font-weight: bold;">Pilih File PDF/Gambar:</label>
                <input type="file" id="uploadFileInput" accept=".pdf,image/jpeg,image/jpg,image/png" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; background: #fafafa;">
            </div>
            
            <button id="uploadBtn" class="upload-option pc" style="width: 100%; background: #ea4335; color: white; border: none; padding: 15px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer;">
                🚀 UPLOAD BUKTI
            </button>
            
            <div id="uploadResult" style="margin-top: 15px; padding: 10px; border-radius: 4px; display: none; text-align: center;"></div>
        </div>
    </div>
</div>

<!-- Input file tersembunyi -->
<input type="file" id="fileInput" accept="image/jpeg,image/jpg,image/png,application/pdf" style="display: none;">
<input type="file" id="cameraInput" accept="image/jpeg,image/jpg,image/png" capture="environment" style="display: none;">

<script src="../config.js"></script>
<script src="../js/tanda-terima.js"></script>
</body>
</html>
