<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>APLIKASI AL - Riwayat</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="container">
    <div class="app-header">
        <div class="app-title">APLIKASI <span>AL</span></div>
        <p class="subtitle">Riwayat Transaksi</p>
    </div>

    <button class="btn-back" onclick="window.location.href='../dashboard.html'">← KEMBALI KE MENU</button>
    
    <div class="card">
        <h2 style="margin-top: 0;">📋 RIWAYAT</h2>
        
        <!-- Toolbar: Export + Cache -->
        <div class="toolbar-container">
            <div class="export-group">
                <button id="btnExportTransfer" class="btn btn-export">📊 Export Transfer</button>
                <button id="btnExportTT" class="btn btn-export">📊 Export Tanda Terima</button>
                <button id="btnExportValas" class="btn btn-export">📊 Export Valas</button>
            </div>
            <!-- Tombol cache akan ditambahkan di sini oleh JavaScript -->
            <div class="cache-group" id="cacheGroup">
                <!-- Akan diisi oleh JavaScript -->
            </div>
        </div>
        
        <div class="riwayat-tabs">
            <button id="riwayatTransferBtn" class="riwayat-tab active">TRANSFER</button>
            <button id="riwayatTTBtn" class="riwayat-tab">TANDA TERIMA</button>
            <button id="riwayatValasBtn" class="riwayat-tab">VALAS</button>
        </div>
        
        <!-- Pencarian Lanjutan -->
        <div id="searchContainer" class="search-advanced">
            <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                <input type="text" id="searchKeyword" placeholder="🔍 Cari (No, Nama, Bank)..." style="flex: 2; padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px;">
                <input type="date" id="searchDateFrom" style="flex: 1; padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px;">
                <input type="date" id="searchDateTo" style="flex: 1; padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px;">
                <select id="searchCurrency" style="flex: 1; padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px;">
                    <option value="">Semua Currency</option>
                    <option value="USD">USD</option>
                    <option value="EUR">EUR</option>
                    <option value="IDR">IDR</option>
                </select>
                <button id="btnSearch" class="btn-success">🔍 Cari</button>
                <button id="btnReset" class="btn-secondary">🔄 Reset</button>
            </div>
        </div>
        
        <!-- TABEL RIWAYAT TRANSFER -->
        <div id="riwayatTransferList" style="overflow-x:auto;">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Tanggal</th>
                        <th>No LOA</th>
                        <th>Bank</th>
                        <th>Penerima</th>
                        <th>Jumlah</th>
                        <th>Currency</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="riwayatTransferBody">
                    <tr><td colspan="7">Loading...</td></tr>
                </tbody>
            </table>
        </div>
        
        <!-- TABEL RIWAYAT TANDA TERIMA -->
        <div id="riwayatTTList" style="display:none; overflow-x:auto;">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Tanggal</th>
                        <th>No TT</th>
                        <th>Dari</th>
                        <th>Kepada</th>
                        <th>Jumlah</th>
                        <th>Currency</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="riwayatTTBody">
                    <tr><td colspan="7">Loading...</td></tr>
                </tbody>
            </table>
        </div>
        
        <!-- TABEL RIWAYAT VALAS -->
        <div id="riwayatValasList" style="display:none; overflow-x:auto;">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Tanggal</th>
                        <th>No Referensi</th>
                        <th>Dari Rekening</th>
                        <th>Ke Rekening</th>
                        <th>Jumlah (IDR)</th>
                        <th>Kurs</th>
                        <th>Jumlah Dapat</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="riwayatValasBody">
                    <tr><td colspan="8">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Scripts -->
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
<script src="../config.js"></script>
<script src="../js/data.js"></script>
<script src="../js/export.js"></script>
<script src="../js/riwayat.js"></script>
</body>
</html>
