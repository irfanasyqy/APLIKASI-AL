<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APLIKASI AL - Riwayat</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="container">
    <div class="app-header">
        <div class="app-title">APLIKASI <span>AL</span></div>
        <p class="subtitle">Riwayat Transfer</p>
    </div>

    <button class="btn-back" onclick="window.location.href='../index.html'">← KEMBALI KE MENU</button>
    
    <div class="card">
        <h2>📋 RIWAYAT</h2>
        <div class="riwayat-tabs">
            <button id="riwayatTransferBtn" class="riwayat-tab active">TRANSFER</button>
            <button id="riwayatTTBtn" class="riwayat-tab">TANDA TERIMA</button>
        </div>
        
        <!-- TABEL RIWAYAT TRANSFER (dengan kolom Aksi) -->
        <div id="riwayatTransferList" style="overflow-x:auto;">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Tanggal</th>
                        <th>No LOA</th>
                        <th>Bank</th>
                        <th>Penerima</th>
                        <th>Jumlah</th>
                        <th>Currency</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="riwayatTransferBody">
                    <tr><td colspan="7">Loading...</td></tr>
                </tbody>
            </table>
        </div>
        
        <!-- TABEL RIWAYAT TANDA TERIMA (dengan kolom Aksi) -->
        <div id="riwayatTTList" style="display:none; overflow-x:auto;">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Tanggal</th>
                        <th>No TT</th>
                        <th>Dari</th>
                        <th>Kepada</th>
                        <th>Jumlah</th>
                        <th>Currency</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="riwayatTTBody">
                    <tr><td colspan="7">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script src="../config.js"></script>
<script src="../js/data.js"></script>
<script src="../js/ui.js"></script>
<script src="../js/transfer.js"></script>
<script src="../js/tanda-terima.js"></script>
<script src="../js/cetak-label.js"></script>
<script src="../js/edit-data.js"></script>
<script src="../js/riwayat.js"></script>
<script src="../js/tukar-faktur.js"></script>
<script src="../js/main.js"></script>
</body>
</html>
