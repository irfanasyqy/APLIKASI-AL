<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Data - APLIKASI AL</title>
    
    <!-- Import CSS yang sudah ada -->
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/menu.css">
    <link rel="stylesheet" href="../css/card.css">
    <link rel="stylesheet" href="../css/form.css">
    <link rel="stylesheet" href="../css/table.css">
    <link rel="stylesheet" href="../css/print.css">
    
    <style>
        /* Preview panel */
        .preview-panel {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 12px;
            border-left: 4px solid #27ae60;
        }
        
        .preview-panel h3 {
            margin-bottom: 10px;
            color: #2c3e50;
        }
        
        /* Popup form */
        .form-popup {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            z-index: 1000;
            width: 90%;
            max-width: 500px;
        }
        
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 999;
        }
        
        .btn-tambah {
            background: #27ae60;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            cursor: pointer;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: bold;
        }
        
        .btn-tambah:hover {
            background: #219a52;
        }
        
        .btn-edit {
            background: #3498db;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            margin-right: 5px;
        }
        
        .btn-edit:hover {
            background: #2980b9;
        }
        
        .btn-hapus {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .btn-hapus:hover {
            background: #c0392b;
        }
        
        .btn-simpan {
            background: #27ae60;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            margin-right: 10px;
        }
        
        .btn-batal {
            background: #95a5a6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #2c3e50;
        }
        
        .form-group input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 12px;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #e74c3c;
        }
        
        #customerTableBody tr {
            cursor: pointer;
        }
        
        #customerTableBody tr:hover {
            background: #f5f5f5;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        
        th {
            background: #2c3e50;
            color: white;
        }
        
        .total-data {
            margin-top: 15px;
            text-align: right;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="app-header">
        <div class="app-title">APLIKASI <span>AL</span></div>
        <p class="subtitle">Customer Data - Alamat dan Kontak</p>
    </div>

    <button class="btn-back" onclick="window.location.href='../index.html'">← KEMBALI KE MENU</button>
    
    <div class="card">
        <h2>👥 DATA CUSTOMER</h2>
        
        <button class="btn-tambah" id="btnTambahCustomer">➕ TAMBAH CUSTOMER</button>
        
        <div style="overflow-x: auto;">
            <table id="customerTable">
                <thead>
                    <tr>
                        <th>No</th>
                        <th>Nama Customer</th>
                        <th>Email</th>
                        <th>Telepon</th>
                        <th>Alamat</th>
                        <th>Kota</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="customerTableBody">
                    <tr><td colspan="7">📡 Memuat data customer...</td></tr>
                </tbody>
            </table>
        </div>
        
        <div class="total-data" id="totalData"></div>
        
        <!-- Preview Panel -->
        <div class="preview-panel" id="previewPanel" style="display: none;">
            <h3>🔍 PREVIEW DATA CUSTOMER</h3>
            <div id="previewContent"></div>
        </div>
    </div>
</div>

<!-- POPUP FORM TAMBAH/EDIT -->
<div class="overlay" id="overlay"></div>
<div class="form-popup" id="customerForm">
    <h3 id="formTitle" style="margin-bottom: 20px; color: #2c3e50;">Tambah Customer</h3>
    <input type="hidden" id="editId" value="">
    <div class="form-group">
        <label>Nama Customer <span style="color: red;">*</span></label>
        <input type="text" id="namaCustomer" placeholder="Nama lengkap customer" required>
    </div>
    <div class="form-group">
        <label>Email</label>
        <input type="email" id="emailCustomer" placeholder="email@example.com">
    </div>
    <div class="form-group">
        <label>Telepon</label>
        <input type="text" id="teleponCustomer" placeholder="Nomor telepon">
    </div>
    <div class="form-group">
        <label>Alamat</label>
        <input type="text" id="alamatCustomer" placeholder="Alamat lengkap">
    </div>
    <div class="form-group">
        <label>Kota</label>
        <input type="text" id="kotaCustomer" placeholder="Kota">
    </div>
    <div class="form-group">
        <label>Catatan (Opsional)</label>
        <input type="text" id="catatanCustomer" placeholder="Catatan tambahan">
    </div>
    <div style="text-align: right;">
        <button class="btn-simpan" id="btnSimpan">💾 SIMPAN</button>
        <button class="btn-batal" id="btnBatal">❌ BATAL</button>
    </div>
</div>

<script src="../config.js"></script>
<script src="../js/customer.js"></script>
</body>
</html>
