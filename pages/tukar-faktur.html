<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APLIKASI AL - Tukar Faktur</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
<div class="container">
    <div class="app-header">
        <div class="app-title">APLIKASI <span>AL</span></div>
        <p class="subtitle">Tukar Faktur / Invoice</p>
    </div>

    <button class="btn-back" onclick="window.location.href='../index.html'">← KEMBALI KE MENU</button>
    
    <div class="card">
        <h2>🔄 TUKAR FAKTUR</h2>
        <div class="form-group"><label>No. Invoice</label><input type="text" id="fakturNo"></div>
        <div class="form-group"><label>Pilih Supplier</label><select id="fakturSupplierSelect"><option>-- Pilih --</option></select></div>
        <div class="row"><div class="form-group"><label>Tanggal</label><input type="date" id="fakturTgl"></div><div class="form-group"><label>Jatuh Tempo</label><input type="date" id="fakturJatuhTempo"></div></div>
        <div class="row"><div class="form-group"><label>Nilai</label><input type="number" id="fakturNilai"></div><div class="form-group"><label>Currency</label><input type="text" id="fakturCurrency" readonly></div></div>
        <button id="btnTukarFaktur" class="btn-success">PROSES</button>
        <div id="fakturResult" class="info-note" style="display:none;"></div>
    </div>
</div>
<script src="../config.js"></script>
<script src="../script.js"></script>
</body>
</html>
