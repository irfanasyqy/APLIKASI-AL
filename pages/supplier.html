<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>APLIKASI AL - Data Supplier</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="container">
    <div class="app-header">
        <div class="app-title">APLIKASI <span>AL</span></div>
        <p class="subtitle">Data Supplier</p>
    </div>

    <button class="btn-back" onclick="window.location.href='../dashboard.html'">← KEMBALI KE MENU</button>
    
    <div class="card">
        <h2>📋 DATA SUPPLIER</h2>
        
        <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
            <button id="btnAddSupplier" class="btn-add-supplier">➕ Tambah Supplier</button>
            <button id="btnExportSupplier" class="btn-success" style="width: auto; padding: 8px 16px;">📊 Export Excel</button>
        </div>
        
        <div style="overflow-x: auto;">
            <table class="supplier-table">
                <thead>
                    <tr>
                        <th>No</th>
                        <th>Nama</th>
                        <th>Account</th>
                        <th>Currency</th>
                        <th>Bank Name</th>
                        <th>Swift</th>
                        <th>Country</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="supplierTableBody">
                    <tr><td colspan="8">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- MODAL TAMBAH / EDIT SUPPLIER -->
<div id="supplierModal" class="modal" style="display: none;">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalTitle">➕ Tambah Supplier Baru</h3>
            <span class="modal-close">&times;</span>
        </div>
        <div class="modal-body">
            <input type="hidden" id="modalEditId" value="">
            <div class="form-group">
                <label>Nama Supplier *</label>
                <input type="text" id="modalNama" placeholder="Nama supplier" required>
            </div>
            <div class="form-group">
                <label>Account Number</label>
                <input type="text" id="modalAccount" placeholder="Nomor rekening">
            </div>
            <div class="form-group">
                <label>Currency *</label>
                <select id="modalCurrency">
                    <option value="USD">USD</option>
                    <option value="EUR">EUR</option>
                    <option value="JPY">JPY</option>
                    <option value="GBP">GBP</option>
                    <option value="SGD">SGD</option>
                </select>
            </div>
            <div class="form-group">
                <label>Alamat</label>
                <textarea id="modalAlamat" rows="2" placeholder="Alamat lengkap supplier"></textarea>
            </div>
            <div class="form-group">
                <label>Bank Name</label>
                <input type="text" id="modalBankName" placeholder="Nama bank">
            </div>
            <div class="form-group">
                <label>Bank Alamat</label>
                <input type="text" id="modalBankAlamat" placeholder="Alamat bank">
            </div>
            <div class="form-group">
                <label>SWIFT Code</label>
                <input type="text" id="modalSwift" placeholder="SWIFT code">
            </div>
            <div class="form-group">
                <label>Country</label>
                <input type="text" id="modalCountry" placeholder="Negara">
            </div>
        </div>
        <div class="modal-footer">
            <button id="modalSaveBtn" class="btn-success">💾 Simpan</button>
            <button id="modalCancelBtn" class="btn-secondary">Batal</button>
        </div>
    </div>
</div>

<!-- Scripts -->
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
<script src="../config.js"></script>
<script src="../js/data.js"></script>
<script src="../js/ui.js"></script>
<script src="../js/supplier.js"></script>
<script src="../js/export.js"></script>

<script>
    // Event listener untuk tombol export
    document.getElementById('btnExportSupplier')?.addEventListener('click', exportSuppliers);
</script>
</body>
</html>
