<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APLIKASI AL - Edit Data</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
<div class="container">
    <div class="app-header">
        <div class="app-title">APLIKASI <span>AL</span></div>
        <p class="subtitle">Edit Data Supplier</p>
    </div>

    <button class="btn-back" onclick="window.location.href='../index.html'">← KEMBALI KE MENU</button>
    
    <div class="card">
        <h2>✏️ EDIT DATA SUPPLIER</h2>
        <div class="form-group"><label>Pilih Supplier</label><select id="editSupplierSelect"><option>-- Pilih --</option></select></div>
        <div id="editForm" style="display:none;">
            <div class="row"><div class="form-group"><label>No</label><input type="text" id="editNo"></div><div class="form-group"><label>Nama</label><input type="text" id="editNama"></div></div>
            <div class="form-group"><label>Account Number</label><input type="text" id="editAccount"></div>
            <div class="form-group"><label>Alamat</label><textarea id="editAlamat" rows="2"></textarea></div>
            <div class="row"><div class="form-group"><label>Bank Name</label><input type="text" id="editBankName"></div><div class="form-group"><label>Swift</label><input type="text" id="editSwift"></div></div>
            <button id="btnUpdateSupplier" class="btn-success">💾 UPDATE</button>
        </div>
    </div>
</div>
<script src="../config.js"></script>
<script src="../script.js"></script>
</body>
</html>
