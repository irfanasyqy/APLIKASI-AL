<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Print Bank Panin</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        .header { text-align: center; border-bottom: 2px solid #1e3c72; }
        .penerima { margin-top: 20px; }
        .loa { text-align: right; }
        .jumlah { background: #f5f5f5; padding: 10px; margin: 20px 0; }
    </style>
</head>
<body>
    <div class="header">
        <h2>BANK PANIN</h2>
        <h3>BUKTI TRANSFER INTERNASIONAL</h3>
    </div>
    
    <!-- SESUAIKAN POSISI FIELD DI SINI -->
    <div class="penerima">
        <strong>PENERIMA:</strong> <span id="nama"></span><br>
        <strong>Account:</strong> <span id="account"></span>
    </div>
    
    <div class="loa">
        <strong>LOA/CEK:</strong> <span id="loa"></span>
    </div>
    
    <div class="jumlah">
        <strong>Jumlah:</strong> <span id="jumlah"></span> <span id="currency"></span>
    </div>
    
    <script>
        // Ambil data dari URL parameter
        const params = new URLSearchParams(window.location.search);
        document.getElementById('nama').innerText = params.get('nama');
        document.getElementById('account').innerText = params.get('account');
        document.getElementById('loa').innerText = params.get('loa');
        document.getElementById('jumlah').innerText = params.get('jumlah');
        document.getElementById('currency').innerText = params.get('currency');
        
        window.print();
    </script>
</body>
</html>
