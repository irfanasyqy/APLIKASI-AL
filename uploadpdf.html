<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload PDF ke Google Drive</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
    .container { max-width: 500px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; }
    h2 { color: #1a73e8; }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-weight: bold; }
    input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
    button { padding: 12px 20px; background: #1a73e8; color: white; border: none; border-radius: 4px; cursor: pointer; width: 100%; margin-bottom: 10px; }
    .btn2 { background: #34a853; }
    .btn-upload { background: #ea4335; font-size: 18px; }
    #result { margin-top: 20px; padding: 15px; border-radius: 4px; display: none; }
    .success { background: #e6f4ea; color: #1e8e3e; }
  </style>
</head>
<body>
  <div class="container">
    <h2>📤 Upload PDF ke Google Drive</h2>
    
    <div class="form-group">
      <label>Pilih File PDF:</label>
      <input type="file" id="fileInput" accept=".pdf">
    </div>
    
    <div class="form-group">
      <label>Folder Tujuan:</label>
      <select id="folderSelect">
        <option value="">Loading...</option>
      </select>
    </div>
    
    <button onclick="loadFolders()">🔄 Refresh Folder</button>
    
    <div class="form-group" style="margin-top:15px;">
      <label>Buat Folder Baru:</label>
      <input type="text" id="newFolderName" placeholder="Nama folder...">
    </div>
    <button class="btn2" onclick="createNewFolder()">➕ Buat Folder</button>
    
    <hr>
    
    <button onclick="uploadFile()" class="btn-upload">🚀 UPLOAD PDF</button>
    
    <div id="result"></div>
  </div>

  <script>
    // GANTI DENGAN URL ANDA
    const API_URL = 'https://script.google.com/macros/s/AKfycbwQiPCKDHixDwS6AEdpl1Jn4mWRa7DJHQAqK88mtFd_xMnd_R6K8B6EiDPupRCqL8ZC/exec';
    
    async function loadFolders() {
      var select = document.getElementById('folderSelect');
      select.innerHTML = '<option>Loading...</option>';
      
      try {
        var response = await fetch(API_URL, {
          redirect: "follow",
          method: "POST",
          body: JSON.stringify({ action: "getFolders" }),
          headers: {
            "Content-Type": "text/plain;charset=utf-8",
          }
        });
        
        var result = await response.json();
        console.log('Response:', result);
        
        if (result.success) {
          select.innerHTML = '';
          result.data.forEach(function(f) {
            var opt = document.createElement('option');
            opt.value = f.id;
            opt.text = f.name;
            select.appendChild(opt);
          });
        } else {
          select.innerHTML = '<option>Error: ' + result.error + '</option>';
        }
      } catch (error) {
        console.error('Error:', error);
        select.innerHTML = '<option>Error: ' + error.message + '</option>';
      }
    }
    
    async function createNewFolder() {
      var name = document.getElementById('newFolderName').value.trim();
      if (!name) return;
      
      try {
        var response = await fetch(API_URL, {
          redirect: "follow",
          method: "POST",
          body: JSON.stringify({ action: "createFolder", folderName: name }),
          headers: {
            "Content-Type": "text/plain;charset=utf-8",
          }
        });
        
        var result = await response.json();
        
        if (result.success) {
          loadFolders();
          document.getElementById('newFolderName').value = '';
        } else {
          alert('Error: ' + result.error);
        }
      } catch (error) {
        alert('Error: ' + error.message);
      }
    }
    
    async function uploadFile() {
      var fileInput = document.getElementById('fileInput');
      var folderSelect = document.getElementById('folderSelect');
      
      if (!fileInput.files[0]) {
        alert('Pilih file!');
        return;
      }
      
      var file = fileInput.files[0];
      
      var reader = new FileReader();
      reader.onload = async function(e) {
        var base64 = e.target.result.split(',')[1];
        
        try {
          var response = await fetch(API_URL, {
            redirect: "follow",
            method: "POST",
            body: JSON.stringify({ 
              action: "upload", 
              data: base64, 
              fileName: file.name, 
              folderId: folderSelect.value 
            }),
            headers: {
              "Content-Type": "text/plain;charset=utf-8",
            }
          });
          
          var result = await response.json();
          console.log('Upload result:', result);
          
          var r = document.getElementById('result');
          if (result.success) {
            r.innerHTML = '✅ BERHASIL!<br>Nama: ' + result.fileName + '<br><a href="' + result.fileUrl + '" target="_blank">Buka File</a>';
            r.style.display = 'block';
            r.className = 'success';
          } else {
            alert('Error: ' + result.error);
          }
        } catch (error) {
          alert('Error: ' + error.message);
        }
      };
      reader.readAsDataURL(file);
    }
    
    // Load folder pas buka halaman
    loadFolders();
  </script>
</body>
</html>
